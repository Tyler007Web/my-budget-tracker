function saveBillPayment(billId){
  const bills=DB.get('bills_'+projYear,[]);
  const bill=bills.find(b=>b.id===billId);
  if(!bill){showToast('Bill not found','error');return;}
  const raw=document.getElementById('billPayAmt').value;
  let amt=parseFloat(raw);
  if(isNaN(amt)||amt<0){showToast('Enter a valid amount','warn');return;}
  // Snapshot form state so we can finish the save after an optional dialog.
  const deductChk=document.getElementById('billDeductChk');
  const srcSel=document.getElementById('billDeductSrc');
  const createTxChk=document.getElementById('billCreateTx');
  const formState={
    deduct: !!(deductChk&&deductChk.checked),
    sourceId: srcSel?srcSel.value:'',
    createTx: !!(createTxChk&&createTxChk.checked)
  };
  // ===== OVERPAYMENT FLOW =====
  // Excess goes either to an "other transaction" or becomes a debt assigned to a person.
  if(amt>bill.amount+0.0001){
    const excess=+(amt-bill.amount).toFixed(2);
    openBillOverpaymentDialog(billId,bill.amount,excess,formState);
    return;
  }
  _commitBillPayment(billId,amt,formState,null);
}

// ----- Internal: apply the bill payment + optional excess action -----
function _commitBillPayment(billId,amt,formState,excessAction){
  const bills=DB.get('bills_'+projYear,[]);
  const bill=bills.find(b=>b.id===billId);
  if(!bill){showToast('Bill not found','error');return;}
  const m=billsViewMonth, y=projYear;
  const key='billPaid_'+y+'_'+m;
  const pm=DB.get(key,{});
  const prevAmt=getBillPaidAmount(bill,pm);
  if(amt<=0) delete pm[billId];
  else pm[billId]=Math.min(amt,bill.amount);
  DB.set(key,pm);
  const metaKey='billPayMeta_'+y+'_'+m;
  const meta=DB.get(metaKey,{});
  const delta=Math.min(amt,bill.amount)-prevAmt;
  let srcMsg='';
  if(formState&&formState.deduct&&formState.sourceId){
    const sources=DB.get('sources',[]);
    const si=sources.findIndex(s=>s.id===formState.sourceId);
    if(si>=0){
      // The amount actually leaving the source = the bill delta + the excess (if any).
      const excessAmt=excessAction?excessAction.amount:0;
      const totalDeduct=Math.max(0,delta)+excessAmt;
      if(totalDeduct>0.0001){
        sources[si].balance-=totalDeduct;
        DB.set('sources',sources);
        srcMsg=' • '+fmt(totalDeduct)+' deducted from '+sources[si].name;
        if(formState.createTx&&delta>0.0001){
          const txs=DB.get('transactions',[]);
          txs.push({id:DB.id(),type:'EXPENSE',category:bill.category||'Bills',amount:+delta.toFixed(2),sourceId:formState.sourceId,date:new Date().toISOString().slice(0,10)+'T12:00:00',description:bill.name+' — '+SHORT[m]+' '+y+(prevAmt>0?' (additional payment)':''),billId,billMonth:m,billYear:y});
          DB.set('transactions',txs);
        }
      } else if(delta<-0.0001){
        srcMsg=' • amount reduced — source not auto-refunded';
      }
      if(amt>0) meta[billId]={sourceId:formState.sourceId,lastAmount:amt};
      else delete meta[billId];
      DB.set(metaKey,meta);
    }
  }
  // ===== Apply excess action (other transaction OR debt) =====
  let excessMsg='';
  if(excessAction&&excessAction.amount>0.0001){
    if(excessAction.kind==='tx'){
      const txs=DB.get('transactions',[]);
      txs.push({
        id:DB.id(),
        type:excessAction.txType||'EXPENSE',
        category:excessAction.category||'Other',
        amount:+excessAction.amount.toFixed(2),
        sourceId:(formState&&formState.deduct)?formState.sourceId:'',
        date:new Date().toISOString().slice(0,10)+'T12:00:00',
        description:excessAction.description||('Overpayment on '+bill.name+' — '+SHORT[m]+' '+y),
        billId,billMonth:m,billYear:y
      });
      DB.set('transactions',txs);
      excessMsg=' • '+fmt(excessAction.amount)+' logged as other transaction';
    } else if(excessAction.kind==='debt'){
      const debts=DB.get('debts',[]);
      debts.push({
        id:DB.id(),
        person:excessAction.person,
        direction:excessAction.direction||'OWED_TO_ME',
        total:+excessAction.amount.toFixed(2),
        paid:0,settled:false,payments:[],
        date:new Date().toISOString().slice(0,10),
        dueDate:null,
        description:'Overpayment on '+bill.name+' — '+SHORT[m]+' '+y,
        billId,billMonth:m,billYear:y
      });
      DB.set('debts',debts);
      // Make sure the person also exists in the contact list so they show up.
      if(!findContact(excessAction.person)){addContact(excessAction.person,'');}
      excessMsg=' • '+fmt(excessAction.amount)+' assigned as debt to '+excessAction.person;
    }
  }
  // Close any open modals (payment + overpayment)
  document.querySelectorAll('.modal-overlay').forEach(o=>o.remove());
  let status;
  const cappedAmt=Math.min(amt,bill.amount);
  if(cappedAmt<=0) status='unpaid';
  else if(cappedAmt>=bill.amount) status='fully paid';
  else status='partial ('+fmt(cappedAmt)+' of '+fmt(bill.amount)+')';
  showToast(bill.name+' → '+status+' for '+SHORT[m]+' '+y+srcMsg+excessMsg,'success');
  render();
}

function confirmBillOverpayment(billId,fsJson){
  let formState={};
  try{formState=JSON.parse(decodeURIComponent(fsJson))||{};}catch(e){formState={};}
  const bills=DB.get('bills_'+projYear,[]);
  const bill=bills.find(b=>b.id===billId);
  if(!bill){showToast('Bill not found','error');return;}
  const panelDebt=document.getElementById('ovPanelDebt');
  const isDebt=panelDebt&&panelDebt.dataset.active==='1';
  let excessAction;
  if(isDebt){
    const person=(document.getElementById('ovDebtPerson').value||'').trim();
    if(!person){showToast('Person name required','warn');return;}
    const a=parseFloat(document.getElementById('ovDebtAmt').value);
    if(!a||a<=0){showToast('Valid debt amount required','warn');return;}
    excessAction={kind:'debt',person,direction:document.getElementById('ovDebtDir').value,amount:a};

  _commitBillPayment(billId,bill.amount,formState,excessAction);

let debtViewPerson=null; // null = overview, string = person detail

let debtHideSettled=false;

// ----- Contacts storage (people without debts still tracked here) -----
function getDebtContactList(){return DB.get('debtContacts',[]);}
function setDebtContactList(list){DB.set('debtContacts',list);}
function findContact(name){return getDebtContactList().find(c=>c.name.toLowerCase()===name.toLowerCase());}
function addContact(name,note){
  const list=getDebtContactList();
  if(list.find(c=>c.name.toLowerCase()===name.toLowerCase())) return false;
  list.push({name,note:note||'',createdAt:new Date().toISOString()});
  setDebtContactList(list);
  return true;
}
function updateContactNote(name,note){
  const list=getDebtContactList();
  const c=list.find(x=>x.name.toLowerCase()===name.toLowerCase());
  if(c){c.note=note||''; setDebtContactList(list);}

function removeContact(name){

}

// Recompute `paid` from the payments array so edits/deletes stay accurate.
function recomputeDebtPaid(debt){
  const sum=(debt.payments||[]).reduce((s,p)=>s+(p.amount||0),0);
  debt.paid=Math.min(sum,debt.total);
  if(debt.paid>=debt.total){if(!debt.settled){debt.settled=true;debt.settledAt=new Date().toISOString();}}
  else if(debt.settled&&!debt.manuallySettled){debt.settled=false;delete debt.settledAt;}
  return debt;
}

function debtUrgency(d){
  if(d.settled||!d.dueDate) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const due=new Date(d.dueDate); due.setHours(0,0,0,0);
  const diff=Math.round((due-today)/86400000);
  if(diff<0) return {kind:'overdue',days:-diff,label:'⚠️ Overdue '+(-diff)+'d',cls:'overdue'};
  if(diff===0) return {kind:'today',days:0,label:'⏰ Due Today',cls:'due-today'};
  if(diff<=7) return {kind:'soon',days:diff,label:'📅 Due in '+diff+'d',cls:'due-soon'};
  return {kind:'ok',days:diff,label:'📅 Due '+due.toLocaleDateString(),cls:'due-ok'};
}

function getDebtPeopleSummary(){
  const debts=DB.get('debts',[]);
  const map={};
  debts.forEach(d=>{
    const name=d.person||'Unknown';
    if(!map[name])map[name]={person:name,debts:[],totalOwedToMe:0,totalIOwe:0,remainingOwedToMe:0,remainingIOwe:0,paidToMe:0,paidByMe:0,activeCount:0,settledCount:0,totalPayments:0,isContactOnly:false,note:''};
    map[name].debts.push(d);
    const rem=d.total-(d.paid||0);
    if(d.direction==='OWED_TO_ME'){
      map[name].totalOwedToMe+=d.total;map[name].paidToMe+=(d.paid||0);
      if(!d.settled){map[name].remainingOwedToMe+=rem;map[name].activeCount++;}else map[name].settledCount++;
    }else{
      map[name].totalIOwe+=d.total;map[name].paidByMe+=(d.paid||0);
      if(!d.settled){map[name].remainingIOwe+=rem;map[name].activeCount++;}else map[name].settledCount++;
    }
    map[name].totalPayments+=(d.payments||[]).length;
  });
  // Merge stand-alone contacts (people without any debt yet).
  getDebtContactList().forEach(c=>{
    if(!map[c.name]){
      map[c.name]={person:c.name,debts:[],totalOwedToMe:0,totalIOwe:0,remainingOwedToMe:0,remainingIOwe:0,paidToMe:0,paidByMe:0,activeCount:0,settledCount:0,totalPayments:0,isContactOnly:true,note:c.note||''};
    } else {
      map[c.name].note=c.note||'';
    }
  });
  return Object.values(map).sort((a,b)=>b.activeCount-a.activeCount||(b.remainingOwedToMe+b.remainingIOwe)-(a.remainingOwedToMe+a.remainingIOwe));
}

function renderDebts(){
  if(debtViewPerson) return renderDebtPersonDetail(debtViewPerson);
  const debts=DB.get('debts',[]);
  // Make sure derived paid is always fresh in the in-memory view (no persistence needed here).
  debts.forEach(d=>{if(d.payments){const s=d.payments.reduce((a,p)=>a+(p.amount||0),0);if(typeof d.paid!=='number'||Math.abs(d.paid-s)>0.001){d.paid=Math.min(s,d.total);}}else if(typeof d.paid!=='number'){d.paid=0;}});
  const allPeople=getDebtPeopleSummary();
  let people=debtSearch?allPeople.filter(p=>p.person.toLowerCase().includes(debtSearch.toLowerCase())):allPeople;
  if(debtFilter==='active') people=people.filter(p=>p.activeCount>0);
  else if(debtFilter==='settled') people=people.filter(p=>p.activeCount===0&&p.settledCount>0);
  else if(debtFilter==='contacts') people=people.filter(p=>p.isContactOnly);
  if(debtSort==='name') people=people.slice().sort((a,b)=>a.person.localeCompare(b.person));
  else if(debtSort==='name-desc') people=people.slice().sort((a,b)=>b.person.localeCompare(a.person));
  else if(debtSort==='recent') people=people.slice().sort((a,b)=>{
    const la=Math.max(0,...a.debts.map(d=>new Date(d.date||0).getTime()));
    const lb=Math.max(0,...b.debts.map(d=>new Date(d.date||0).getTime()));
    return lb-la;
  });
  else if(debtSort==='net') people=people.slice().sort((a,b)=>Math.abs(b.remainingOwedToMe-b.remainingIOwe)-Math.abs(a.remainingOwedToMe-a.remainingIOwe));
  // default is already active-first by net
  const totalOwedToMe=allPeople.reduce((s,p)=>s+p.remainingOwedToMe,0);
  const totalIOwe=allPeople.reduce((s,p)=>s+p.remainingIOwe,0);
  const activeDebts=debts.filter(d=>!d.settled).length;
  // Overdue summary
  const overdueDebts=debts.filter(d=>{const u=debtUrgency(d);return u&&u.kind==='overdue';});
  const dueSoonDebts=debts.filter(d=>{const u=debtUrgency(d);return u&&(u.kind==='today'||u.kind==='soon');});
  return `
    <div class="animate-fadeInUp" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px">
      <div><h1 style="font-size:26px;font-weight:800;letter-spacing:-.5px">Debt Tracker</h1><p style="color:#525252;font-size:13px;margin-top:2px">${allPeople.length} ${allPeople.length===1?'person':'people'} • ${activeDebts} active${overdueDebts.length?` • <span style="color:#ef4444">${overdueDebts.length} overdue</span>`:''}</p></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-ghost" style="border:1px solid rgba(124,58,237,.2);color:#a78bfa" onclick="openAddContactDialog()">👤 Add Person</button>
        <button class="btn btn-primary" onclick="openDebtDialog()">+ Add Debt</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:18px">
      ${statCard('Owed to Me',fmt(totalOwedToMe),'📥','#10b981','stagger-1')}
      ${statCard('I Owe',fmt(totalIOwe),'📤','#ef4444','stagger-2')}
      ${statCard('Net Position',fmt(totalOwedToMe-totalIOwe),'⚖️',totalOwedToMe-totalIOwe>=0?'#10b981':'#ef4444','stagger-3')}
    </div>
    ${(overdueDebts.length||dueSoonDebts.length)?`<div class="glass-card animate-fadeInUp stagger-2" style="margin-bottom:14px;border-color:${overdueDebts.length?'rgba(239,68,68,.25)':'rgba(251,191,36,.25)'};background:${overdueDebts.length?'rgba(239,68,68,.04)':'rgba(251,191,36,.04)'}"><div class="card-body" style="padding:10px 14px;font-size:11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span style="font-size:16px">${overdueDebts.length?'⚠️':'⏰'}</span>
      <b style="color:${overdueDebts.length?'#ef4444':'#fbbf24'}">${overdueDebts.length} overdue${dueSoonDebts.length?' • '+dueSoonDebts.length+' due soon':''}</b>
      <span style="color:#737373">${[...overdueDebts,...dueSoonDebts].slice(0,4).map(d=>`<button class="btn btn-ghost btn-sm" style="padding:2px 8px;font-size:10px;border:1px solid rgba(255,255,255,.06);margin-left:4px" onclick="debtViewPerson='${(d.person||'').replace(/'/g,"\\'")}';render()">${d.person} → ${fmt(d.total-(d.paid||0))}</button>`).join('')}</span>
    </div></div>`:''}
    <div class="animate-fadeInUp stagger-2" style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <input type="text" id="debtSearchInput" placeholder="🔍 Search people..." value="${debtSearch}" oninput="onSearchInput('debtSearch',event)" style="width:220px;max-width:100%">
      <select onchange="debtFilter=this.value;render()" style="width:auto">
        <option value="all"${debtFilter==='all'?' selected':''}>All people</option>
        <option value="active"${debtFilter==='active'?' selected':''}>Active only</option>
        <option value="settled"${debtFilter==='settled'?' selected':''}>Fully settled</option>
        <option value="contacts"${debtFilter==='contacts'?' selected':''}>Contacts (no debts)</option>
      </select>
      <select onchange="debtSort=this.value;render()" style="width:auto">
        <option value="default"${debtSort==='default'?' selected':''}>Sort: Default</option>
        <option value="name"${debtSort==='name'?' selected':''}>Sort: Name A→Z</option>
        <option value="name-desc"${debtSort==='name-desc'?' selected':''}>Sort: Name Z→A</option>
        <option value="recent"${debtSort==='recent'?' selected':''}>Sort: Most recent</option>
        <option value="net"${debtSort==='net'?' selected':''}>Sort: Biggest net</option>
      </select>
    </div>
    ${people.length===0?`<div class="glass-card animate-fadeInUp stagger-3"><div class="card-body"><p class="text-muted" style="text-align:center;padding:28px;font-size:13px">${debtSearch?'No people found matching "'+debtSearch+'"':debtFilter!=='all'?'No matching people for this filter':'No debts yet — add one to get started!'}</p></div></div>`:
    `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px" class="animate-fadeInUp stagger-3">
      ${people.map((p,i)=>{
        if(p.isContactOnly){
          return `<div class="glass-card-sm" style="cursor:pointer;transition:all .25s;border-style:dashed" onclick="debtViewPerson='${p.person.replace(/'/g,"\\'")}';render()">
            <div class="card-body">
              <div style="display:flex;justify-content:space-between;align-items:start;gap:10px;margin-bottom:8px">
                <div style="display:flex;align-items:center;gap:10px;min-width:0">
                  <div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,rgba(107,114,128,.25),rgba(75,85,99,.15));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#a3a3a3">${p.person[0].toUpperCase()}</div>
                  <div style="min-width:0"><div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.person}</div><div style="font-size:10px;color:#525252">Contact — no debts</div></div>
                </div>
                <span style="font-size:9px;color:#a3a3a3;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:2px 6px">👤</span>
              </div>
              ${p.note?`<div style="font-size:11px;color:#737373;font-style:italic;background:rgba(255,255,255,.02);border-radius:6px;padding:6px 8px;margin-bottom:6px">“${p.note}”</div>`:''}
              <div style="display:flex;gap:4px" onclick="event.stopPropagation()">
                <button class="btn btn-ghost btn-sm" style="flex:1;font-size:10px;border:1px solid rgba(124,58,237,.2);color:#a78bfa" onclick="event.stopPropagation();openDebtDialog(null,'${p.person.replace(/'/g,"\\'")}')">+ Add Debt</button>
                <button class="btn btn-ghost btn-sm" style="font-size:10px" onclick="event.stopPropagation();openAddContactDialog('${p.person.replace(/'/g,"\\'")}')">✏️</button>
                <button class="btn btn-danger btn-sm" style="font-size:10px" onclick="event.stopPropagation();deleteContact('${p.person.replace(/'/g,"\\'")}')">🗑</button>
              </div>
            </div>
          </div>`;
        }
        const netAmount=p.remainingOwedToMe-p.remainingIOwe;
        const totalAll=p.totalOwedToMe+p.totalIOwe;
        const totalPaid=p.paidToMe+p.paidByMe;
        const paidPct=totalAll>0?Math.round(totalPaid/totalAll*100):0;
        // Mini bar chart data: owed to me vs I owe
        const maxBar=Math.max(p.totalOwedToMe,p.totalIOwe,1);
        return `<div class="glass-card-sm" style="cursor:pointer;transition:all .25s" onclick="debtViewPerson='${p.person.replace(/'/g,"\\\'")}';render()">
          <div class="card-body">
            <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px">
              <div style="display:flex;align-items:center;gap:10px">
                <div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,rgba(124,58,237,.25),rgba(168,85,247,.15));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#a78bfa">${p.person[0].toUpperCase()}</div>
                <div>
                  <div style="font-weight:600;font-size:14px">${p.person}</div>
                  <div style="font-size:10px;color:#525252">${p.activeCount} active • ${p.settledCount} settled</div>
                </div>
              </div>
              <div style="text-align:right">
                <div class="font-mono" style="font-size:15px;font-weight:700;color:${netAmount>=0?'#10b981':'#ef4444'}">${netAmount>=0?'+':''}${fmt(netAmount)}</div>
                <div style="font-size:9px;color:#525252">net</div>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">
              <div style="display:flex;align-items:center;gap:6px">
                <span style="font-size:10px;color:#10b981;width:55px;flex-shrink:0">Owes me</span>
                <div style="flex:1;height:8px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden"><div style="height:100%;background:linear-gradient(90deg,#10b981,#34d399);border-radius:4px;width:${(p.totalOwedToMe/maxBar*100).toFixed(0)}%;transition:width .3s"></div></div>
                <span class="font-mono" style="font-size:10px;color:#10b981;width:60px;text-align:right">${fmt(p.remainingOwedToMe)}</span>
              </div>
              <div style="display:flex;align-items:center;gap:6px">
                <span style="font-size:10px;color:#ef4444;width:55px;flex-shrink:0">I owe</span>
                <div style="flex:1;height:8px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden"><div style="height:100%;background:linear-gradient(90deg,#ef4444,#f87171);border-radius:4px;width:${(p.totalIOwe/maxBar*100).toFixed(0)}%;transition:width .3s"></div></div>
                <span class="font-mono" style="font-size:10px;color:#ef4444;width:60px;text-align:right">${fmt(p.remainingIOwe)}</span>
              </div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div style="flex:1;height:4px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden;margin-right:8px"><div style="height:100%;background:linear-gradient(90deg,#a78bfa,#7c3aed);border-radius:2px;width:${paidPct}%"></div></div>
              <span style="font-size:9px;color:#737373">${paidPct}% repaid</span>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`}
  `;
}

function renderDebtPersonDetail(personName){
  const allDebts=DB.get('debts',[]).filter(d=>d.person===personName);
  const contact=findContact(personName);
  // If no debts AND no contact entry, bail out.
  if(allDebts.length===0 && !contact){debtViewPerson=null;return renderDebts();}
  // If contact-only render a minimal page with Add Debt + edit/delete contact.
  if(allDebts.length===0){
    return `
      <div class="animate-fadeInUp" style="margin-bottom:20px">
        <button class="btn btn-ghost btn-sm" style="margin-bottom:12px;border:1px solid rgba(255,255,255,.06)" onclick="debtViewPerson=null;render()">← Back to People</button>
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
          <div style="width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,rgba(107,114,128,.3),rgba(75,85,99,.15));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#a3a3a3">${personName[0].toUpperCase()}</div>
          <div>
            <h1 style="font-size:26px;font-weight:800;letter-spacing:-.5px">${personName}</h1>
            <p style="color:#525252;font-size:13px">👤 Contact — no debts yet</p>
          </div>
          <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-ghost btn-sm" style="border:1px solid rgba(255,255,255,.06)" onclick="openAddContactDialog('${personName.replace(/'/g,"\\'")}')">✏️ Edit Note</button>
            <button class="btn btn-primary" onclick="openDebtDialog(null,'${personName.replace(/'/g,"\\'")}')">+ Add Debt</button>
          </div>
        </div>
      </div>
      <div class="glass-card animate-fadeInUp stagger-2"><div class="card-body">
        ${contact.note?`<div style="font-size:12px;color:#a3a3a3;font-style:italic;background:rgba(255,255,255,.02);border-radius:8px;padding:12px;margin-bottom:14px">“${contact.note}”</div>`:'<p style="font-size:12px;color:#525252;margin-bottom:14px">No notes yet for this contact.</p>'}
        <p style="font-size:12px;color:#737373">Added ${new Date(contact.createdAt).toLocaleDateString()}.</p>
        <button class="btn btn-danger btn-sm" style="margin-top:12px" onclick="deleteContact('${personName.replace(/'/g,"\\'")}')">🗑 Remove Contact</button>
      </div></div>`;
  }
  // Apply per-person filter
  const filterFn=d=>{
    switch(debtDetailFilter){
      case'active':return !d.settled;
      case'settled':return d.settled;
      case'unpaid':return !d.settled && (d.paid||0)===0;
      case'partial':return !d.settled && (d.paid||0)>0;
      case'paid':return d.settled;
      case'owedtome':return d.direction==='OWED_TO_ME';
      case'iowe':return d.direction==='I_OWE';
      default:return true;
    }
  };
  const debts=allDebts.filter(filterFn);
  const active=allDebts.filter(d=>!d.settled);
  const settled=allDebts.filter(d=>d.settled);
  const owedToMe=allDebts.filter(d=>d.direction==='OWED_TO_ME');
  const iOwe=allDebts.filter(d=>d.direction==='I_OWE');
  const totalOwed=owedToMe.reduce((s,d)=>s+d.total,0);
  const totalIOweAmt=iOwe.reduce((s,d)=>s+d.total,0);
  const paidToMe=owedToMe.reduce((s,d)=>s+(d.paid||0),0);
  const paidByMe=iOwe.reduce((s,d)=>s+(d.paid||0),0);
  const remainOwed=owedToMe.filter(d=>!d.settled).reduce((s,d)=>s+(d.total-(d.paid||0)),0);
  const remainIOwe=iOwe.filter(d=>!d.settled).reduce((s,d)=>s+(d.total-(d.paid||0)),0);
  const net=remainOwed-remainIOwe;
  const allPayments=[];
  allDebts.forEach(d=>(d.payments||[]).forEach(p=>allPayments.push({...p,debtId:d.id,direction:d.direction,person:d.person,debtDesc:d.description})));
  allPayments.sort((a,b)=>new Date(b.date)-new Date(a.date));
  // Group payments by groupId (distributed payments) so we can show one row representing a single user action.
  const groupedPayments={};
  allPayments.forEach(p=>{if(p.groupId){if(!groupedPayments[p.groupId])groupedPayments[p.groupId]=[];groupedPayments[p.groupId].push(p);}});
  // Donut-style breakdown
  const totalAll=totalOwed+totalIOweAmt;
  const owedPct=totalAll>0?Math.round(totalOwed/totalAll*100):0;
  // Timeline: group debts by month
  const timeline={};
  allDebts.forEach(d=>{
    const dt=d.date?new Date(d.date):new Date();
    const key=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
    if(!timeline[key])timeline[key]={label:SHORT[dt.getMonth()]+' '+dt.getFullYear(),owedToMe:0,iOwe:0};
    if(d.direction==='OWED_TO_ME')timeline[key].owedToMe+=d.total;else timeline[key].iOwe+=d.total;
  });
  const timeKeys=Object.keys(timeline).sort();
  const maxTimeline=Math.max(...timeKeys.map(k=>Math.max(timeline[k].owedToMe,timeline[k].iOwe)),1);

  return `
    <div class="animate-fadeInUp" style="margin-bottom:20px">
      <button class="btn btn-ghost btn-sm" style="margin-bottom:12px;border:1px solid rgba(255,255,255,.06)" onclick="debtViewPerson=null;render()">← Back to People</button>
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <div style="width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(168,85,247,.15));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#a78bfa">${personName[0].toUpperCase()}</div>
        <div>
          <h1 style="font-size:26px;font-weight:800;letter-spacing:-.5px">${personName}</h1>
          <p style="color:#525252;font-size:13px">${active.length} active • ${settled.length} settled • ${allPayments.length} payments</p>
          ${contact&&contact.note?`<p style="color:#737373;font-size:11px;font-style:italic;margin-top:2px">“${contact.note}”</p>`:''}
        </div>
        <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">
          ${active.length>0?`<button class="btn btn-sm" style="background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);color:#a78bfa;font-weight:600" onclick="openDistributePaymentDialog('${personName.replace(/'/g,"\\'")}')">💵 Distribute Payment</button>`:''}
          ${active.length>1?`<button class="btn btn-ghost btn-sm" style="border:1px solid rgba(124,58,237,.25);color:#a78bfa" onclick="openPayAllDialog('${personName.replace(/'/g,"\\'")}')">💸 Pay All Active</button>`:''}
          <button class="btn btn-primary" onclick="openDebtDialog(null,'${personName.replace(/'/g,"\\'")}')">+ Add Debt</button>
        </div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px">
      ${statCard('They Owe Me',fmt(remainOwed),'📥','#10b981','stagger-1')}
      ${statCard('I Owe Them',fmt(remainIOwe),'📤','#ef4444','stagger-2')}
      ${statCard('Net Balance',fmt(net),'⚖️',net>=0?'#10b981':'#ef4444','stagger-3')}
      ${statCard('Total Transacted',fmt(totalAll),'💰','#a78bfa','stagger-4')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:18px">
      <div class="glass-card animate-fadeInUp stagger-2"><div class="card-header" style="font-weight:600;font-size:14px">📊 Debt Breakdown</div><div class="card-body">
        <div style="display:flex;align-items:center;gap:16px">
          <div style="position:relative;width:80px;height:80px;flex-shrink:0">
            <svg viewBox="0 0 36 36" style="width:80px;height:80px;transform:rotate(-90deg)">
              <circle cx="18" cy="18" r="14" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="4"/>
              <circle cx="18" cy="18" r="14" fill="none" stroke="#10b981" stroke-width="4" stroke-dasharray="${owedPct*.88} ${(100-owedPct)*.88}" stroke-linecap="round"/>
              <circle cx="18" cy="18" r="14" fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="${(100-owedPct)*.88} ${owedPct*.88}" stroke-dashoffset="${-owedPct*.88}" stroke-linecap="round"/>
            </svg>
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column">
              <div style="font-size:11px;font-weight:700;color:#e5e5e5">${debts.length}</div>
              <div style="font-size:8px;color:#525252">debts</div>
            </div>
          </div>
          <div style="flex:1;display:flex;flex-direction:column;gap:8px">
            <div><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:#10b981">📥 Owes Me</span><span class="font-mono" style="color:#10b981;font-weight:600">${fmt(totalOwed)}</span></div>
              <div style="height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden"><div style="height:100%;background:#10b981;width:${totalAll>0?(totalOwed/totalAll*100):0}%;border-radius:3px"></div></div>
              <div style="font-size:9px;color:#525252;margin-top:2px">Paid: ${fmt(paidToMe)} (${totalOwed>0?Math.round(paidToMe/totalOwed*100):0}%)</div>
            </div>
            <div><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:#ef4444">📤 I Owe</span><span class="font-mono" style="color:#ef4444;font-weight:600">${fmt(totalIOweAmt)}</span></div>
              <div style="height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden"><div style="height:100%;background:#ef4444;width:${totalAll>0?(totalIOweAmt/totalAll*100):0}%;border-radius:3px"></div></div>
              <div style="font-size:9px;color:#525252;margin-top:2px">Paid: ${fmt(paidByMe)} (${totalIOweAmt>0?Math.round(paidByMe/totalIOweAmt*100):0}%)</div>
            </div>
          </div>
        </div>
      </div></div>
      ${timeKeys.length>0?`<div class="glass-card animate-fadeInUp stagger-3"><div class="card-header" style="font-weight:600;font-size:14px">📅 Debt Timeline</div><div class="card-body">
        ${timeKeys.map(k=>{const t=timeline[k];return `
          <div style="margin-bottom:10px">
            <div style="font-size:10px;font-weight:600;color:#a3a3a3;margin-bottom:4px">${t.label}</div>
            ${t.owedToMe>0?`<div style="display:flex;gap:4px;align-items:center"><div style="height:12px;background:linear-gradient(90deg,#10b981,#34d399);border-radius:3px;width:${(t.owedToMe/maxTimeline*100).toFixed(0)}%;min-width:3px"></div><span class="font-mono" style="font-size:9px;color:#10b981">${fmt(t.owedToMe)}</span></div>`:''}
            ${t.iOwe>0?`<div style="display:flex;gap:4px;align-items:center;margin-top:2px"><div style="height:12px;background:linear-gradient(90deg,#ef4444,#f87171);border-radius:3px;width:${(t.iOwe/maxTimeline*100).toFixed(0)}%;min-width:3px"></div><span class="font-mono" style="font-size:9px;color:#ef4444">${fmt(t.iOwe)}</span></div>`:''}
          </div>`;
        }).join('')}
        <div style="display:flex;gap:12px;font-size:9px;color:#525252;margin-top:6px"><span style="color:#10b981">■ Owes Me</span><span style="color:#ef4444">■ I Owe</span></div>
      </div></div>`:''}
    </div>
    <div class="glass-card animate-fadeInUp stagger-4" style="margin-bottom:16px"><div class="card-header" style="font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
      <span>📋 All Debts <span style="color:#525252;font-weight:400;font-size:11px">(${debts.length}/${allDebts.length})</span></span>
      <select onchange="debtDetailFilter=this.value;render()" style="width:auto">
        <option value="all"${debtDetailFilter==='all'?' selected':''}>All</option>
        <option value="active"${debtDetailFilter==='active'?' selected':''}>🔥 Active (unsettled)</option>

function getDebtContacts(){
  const debts=DB.get('debts',[]);
  const names=new Set();
  debts.forEach(d=>{if(d.person)names.add(d.person);});
  getDebtContactList().forEach(c=>names.add(c.name));
  return Array.from(names).sort((a,b)=>a.localeCompare(b));
}

function _distributionPlan(personName){
  const direction=document.getElementById('distDir').value;
  const amt=parseFloat(document.getElementById('distAmt').value)||0;
  const order=document.getElementById('distOrder').value;
  let debts=DB.get('debts',[]).filter(d=>d.person===personName&&!d.settled&&d.direction===direction);
  // Sort
  if(order==='oldest') debts.sort((a,b)=>new Date(a.date||0)-new Date(b.date||0));
  else if(order==='newest') debts.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
  else if(order==='due') debts.sort((a,b)=>{const ad=a.dueDate?new Date(a.dueDate).getTime():Infinity;const bd=b.dueDate?new Date(b.dueDate).getTime():Infinity;return ad-bd;});
  else if(order==='smallest') debts.sort((a,b)=>(a.total-(a.paid||0))-(b.total-(b.paid||0)));
  else if(order==='largest') debts.sort((a,b)=>(b.total-(b.paid||0))-(a.total-(a.paid||0)));
  let remainingPayment=amt;
  const allocations=[];
  for(const d of debts){
    if(remainingPayment<=0.0001) break;
    const remDebt=d.total-(d.paid||0);
    const apply=Math.min(remDebt,remainingPayment);
    if(apply>0){
      allocations.push({debt:d,applied:apply,remainingAfter:remDebt-apply,fullySettles:remDebt-apply<=0.0001});
      remainingPayment-=apply;
    }
  }
  return {direction,amt,order,allocations,unallocated:remainingPayment};
}
function updateDistPreview(personName){
  const el=document.getElementById('distPreview');
  if(!el) return;
  const {amt,allocations,unallocated}=_distributionPlan(personName);
  if(amt<=0){el.innerHTML='Enter an amount to see how it will be distributed.';return;}
  if(allocations.length===0){el.innerHTML='<span style="color:#fbbf24">No active debts in this direction to apply to.</span>';return;}
  const totalApplied=allocations.reduce((s,a)=>s+a.applied,0);
  el.innerHTML=`<div style="font-weight:600;color:#a78bfa;margin-bottom:6px">Will apply ${fmt(totalApplied)} across ${allocations.length} debt${allocations.length>1?'s':''}${unallocated>0.0001?` <span style="color:#fbbf24">(${fmt(unallocated)} left over)</span>`:''}</div>
    ${allocations.map(a=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)">
      <span style="color:#a3a3a3">${a.debt.description||'Debt '+a.debt.id.slice(0,4)}${a.debt.dueDate?' • due '+new Date(a.debt.dueDate).toLocaleDateString():''}</span>
      <span class="font-mono" style="color:${a.fullySettles?'#10b981':'#e5e5e5'};font-weight:600">${fmt(a.applied)}${a.fullySettles?' ✓':' → '+fmt(a.remainingAfter)+' left'}</span>
    </div>`).join('')}`;
}
function saveDistributePayment(personName){
  const plan=_distributionPlan(personName);
  if(plan.amt<=0){showToast('Enter a valid amount','warn');return;}
  if(plan.allocations.length===0){showToast('No active debts to apply to','warn');return;}
  const debts=DB.get('debts',[]);
  const sources=DB.get('sources',[]);
  const txs=DB.get('transactions',[]);
  const groupId=DB.id();
  const date=document.getElementById('distDate').value;
  const note=document.getElementById('distNote').value||'';
  const srcId=document.getElementById('distSource')?.value||null;
  const createTx=document.getElementById('distCreateTx')?.checked;
  let totalApplied=0; let settledCount=0;
  plan.allocations.forEach(a=>{
    const idx=debts.findIndex(d=>d.id===a.debt.id);
    if(idx<0) return;
    if(!debts[idx].payments) debts[idx].payments=[];
    debts[idx].payments.push({amount:a.applied,date,note:note?note+' (distributed)':'Distributed payment',sourceId:srcId||null,groupId,groupTotal:plan.amt,groupCount:plan.allocations.length});
    debts[idx].paid=(debts[idx].paid||0)+a.applied;
    if(debts[idx].paid>=debts[idx].total){debts[idx].settled=true;debts[idx].settledAt=new Date().toISOString();settledCount++;}
    totalApplied+=a.applied;
  });
  // Adjust source + create one transaction reflecting the lump sum
  if(srcId){
    const si=sources.findIndex(s=>s.id===srcId);
    if(si>=0){
      if(plan.direction==='I_OWE') sources[si].balance-=totalApplied;
      else sources[si].balance+=totalApplied;
      DB.set('sources',sources);
    }
    if(createTx){
      const isExpense=plan.direction==='I_OWE';
      txs.push({id:DB.id(),type:isExpense?'EXPENSE':'INCOME',amount:totalApplied,category:isExpense?'Debt Repayment':'Debt Collected',description:`${personName} — distributed across ${plan.allocations.length} debt(s)${note?' — '+note:''}`,sourceId:srcId,date,debtGroupId:groupId});
      DB.set('transactions',txs);
    }
  }
  DB.set('debts',debts);
  const overlay=document.querySelector('.modal-overlay');if(overlay) overlay.remove();
  showToast(`Applied ${fmt(totalApplied)} across ${plan.allocations.length} debt(s)${settledCount?' — '+settledCount+' settled':''}`,'success');
  render();
}

function saveDebt(id){
  const debts=DB.get('debts',[]);
  const person=document.getElementById('debtPerson').value.trim();
  if(!person){showToast('Person name required','warn');return;}
  const total=parseFloat(document.getElementById('debtAmt').value);
  if(!total||total<=0){showToast('Valid amount required','warn');return;}
  const dueDate=document.getElementById('debtDueDate').value||null;
  const data={person,direction:document.getElementById('debtDir').value,total,date:document.getElementById('debtDate').value,dueDate,description:document.getElementById('debtDesc').value};
  if(id){const idx=debts.findIndex(d=>d.id===id);if(idx>=0)debts[idx]={...debts[idx],...data};}
  else debts.push({id:DB.id(),...data,paid:0,settled:false,payments:[]});
  DB.set('debts',debts);document.querySelector('.modal-overlay').remove();showToast(id?'Debt updated':'Debt added','success');render();
}

function saveDebtPayment(id,settleMode){
  const debts=DB.get('debts',[]);const idx=debts.findIndex(d=>d.id===id);
  if(idx<0)return;
  const amt=parseFloat(document.getElementById('payAmt').value);
  if(isNaN(amt)||amt<=0){showToast('Valid amount required','warn');return;}
  const remaining=debts[idx].total-(debts[idx].paid||0);
  const actualAmt=Math.min(amt,remaining);
  if(!debts[idx].payments)debts[idx].payments=[];
  const srcId=document.getElementById('paySource')?.value||null;
  const note=document.getElementById('payNote')?.value||'';
  const date=document.getElementById('payDate').value;
  const createTx=document.getElementById('payCreateTx')?.checked;
  debts[idx].payments.push({amount:actualAmt,date,note,sourceId:srcId||null});
  debts[idx].paid=(debts[idx].paid||0)+actualAmt;
  let settledNow=false;
  if(debts[idx].paid>=debts[idx].total){debts[idx].settled=true;debts[idx].settledAt=new Date().toISOString();settledNow=true;}
  else if(settleMode&&document.getElementById('paySettleFlag')?.checked){debts[idx].settled=true;debts[idx].settledAt=new Date().toISOString();debts[idx].manuallySettled=true;settledNow=true;}
  // Adjust source balance
  let srcMsg='';
  if(srcId){
    const sources=DB.get('sources',[]);const si=sources.findIndex(s=>s.id===srcId);
    if(si>=0){
      if(debts[idx].direction==='I_OWE')sources[si].balance-=actualAmt;
      else sources[si].balance+=actualAmt;
      DB.set('sources',sources);
      srcMsg=` • ${debts[idx].direction==='I_OWE'?'-':'+'}${fmt(actualAmt)} ${sources[si].name}`;
    }
    // Optionally create a matching transaction
    if(createTx){
      const txs=DB.get('transactions',[]);
      const isExpense=debts[idx].direction==='I_OWE';
      txs.push({id:DB.id(),type:isExpense?'EXPENSE':'INCOME',amount:actualAmt,category:isExpense?'Debt Repayment':'Debt Collected',description:`${debts[idx].person}${note?' — '+note:''}`,sourceId:srcId,date,debtId:id});
      DB.set('transactions',txs);
    }
  }
  DB.set('debts',debts);
  const overlay=document.querySelector('.modal-overlay');if(overlay)overlay.remove();
  showToast(`Payment ${fmt(actualAmt)}${srcMsg}${settledNow?' — Settled!':''}`,'success');
  render();
}

// ===== DEBT OFFSET (counter-debt settlement) =====
// When the same person both owes you and is owed by you, money never has to move
// for the overlapping amount. This dialog lets the user pick how much to offset.
// Internally it records a paired "OFFSET" payment on one active debt from each
// direction (FIFO across multiple), so balances on both sides reduce together.
function openDebtOffsetDialog(personName,prefillDebtId){
  const debts=DB.get('debts',[]).filter(d=>d.person===personName&&!d.settled);
  const owed=debts.filter(d=>d.direction==='OWED_TO_ME'); // they owe me
  const iOwe=debts.filter(d=>d.direction==='I_OWE');       // i owe them
  const totalOwed=owed.reduce((s,d)=>s+(d.total-(d.paid||0)),0);
  const totalIOwe=iOwe.reduce((s,d)=>s+(d.total-(d.paid||0)),0);
  if(totalOwed<=0||totalIOwe<=0){showToast('No counter-debt to offset for '+personName,'info');return;}
  const maxOffset=+Math.min(totalOwed,totalIOwe).toFixed(2);
  const html=`<div class="modal-overlay" onclick="if(event.target===this)this.remove()"><div class="modal" style="max-width:500px"><div style="padding:24px">
    <h3 style="font-weight:700;margin-bottom:4px;font-size:16px">⚖️ Offset Counter-Debt — ${personName}</h3>
    <p style="font-size:12px;color:#a3a3a3;margin-bottom:14px">Cancel out overlapping amounts on both sides without moving any cash. We'll apply the offset across active debts in oldest-first order on each side.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px;margin-bottom:16px">
      <div><div style="color:#525252;font-size:10px;text-transform:uppercase;letter-spacing:.4px;font-weight:600">They Owe Me</div><div class="font-mono" style="color:#10b981;font-weight:700;font-size:14px;margin-top:2px">${fmt(totalOwed)}</div><div style="font-size:9px;color:#525252">${owed.length} debt${owed.length===1?'':'s'}</div></div>
      <div><div style="color:#525252;font-size:10px;text-transform:uppercase;letter-spacing:.4px;font-weight:600">I Owe Them</div><div class="font-mono" style="color:#ef4444;font-weight:700;font-size:14px;margin-top:2px">${fmt(totalIOwe)}</div><div style="font-size:9px;color:#525252">${iOwe.length} debt${iOwe.length===1?'':'s'}</div></div>
      <div><div style="color:#525252;font-size:10px;text-transform:uppercase;letter-spacing:.4px;font-weight:600">Max Offset</div><div class="font-mono" style="color:#a78bfa;font-weight:700;font-size:14px;margin-top:2px">${fmt(maxOffset)}</div><div style="font-size:9px;color:#525252">no cash moves</div></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div>
        <label style="font-size:11px;color:#737373;display:block;margin-bottom:5px;font-weight:500">Offset Amount</label>
        <div style="display:flex;gap:6px"><input type="number" step="0.01" min="0.01" max="${maxOffset}" id="offsetAmt" value="${maxOffset}"><button class="btn btn-ghost btn-sm" onclick="openCalc('offsetAmt')">🧮</button></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
          <button type="button" class="btn btn-sm" style="background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.3);color:#a78bfa;font-weight:600;font-size:10px" onclick="document.getElementById('offsetAmt').value='${maxOffset}'">⚖️ Full Offset</button>
          <button type="button" class="btn btn-sm" style="background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);color:#fbbf24;font-weight:600;font-size:10px" onclick="document.getElementById('offsetAmt').value='${(maxOffset/2).toFixed(2)}'">½ Half</button>
        </div>
      </div>
      <div><label style="font-size:11px;color:#737373;display:block;margin-bottom:5px;font-weight:500">Date</label><input type="date" id="offsetDate" value="${new Date().toISOString().slice(0,10)}"></div>
      <div><label style="font-size:11px;color:#737373;display:block;margin-bottom:5px;font-weight:500">Note (optional)</label><input type="text" id="offsetNote" placeholder="Reason for the offset"></div>
      <p style="font-size:10px;color:#525252;background:rgba(124,58,237,.05);border:1px solid rgba(124,58,237,.15);border-radius:8px;padding:8px 10px"><b style="color:#a78bfa">How it works:</b> the offset amount is recorded as a payment on debts from <b>both sides</b>. No money source is touched and no transactions are created — this is a pure accounting offset.</p>
    </div>
    <div style="display:flex;gap:8px;margin-top:20px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove();${prefillDebtId?`openDebtPayment('${prefillDebtId}')`:''}">Cancel</button>
      <button class="btn btn-primary" onclick="confirmDebtOffset('${personName.replace(/'/g,"\\'")}')">⚖️ Apply Offset</button>
    </div>
  </div></div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
  setTimeout(()=>{const i=document.getElementById('offsetAmt');if(i){i.focus();i.select();}},50);
}

function confirmDebtOffset(personName){
  const amtRaw=document.getElementById('offsetAmt').value;
  let amt=parseFloat(amtRaw);
  if(isNaN(amt)||amt<=0){showToast('Valid offset amount required','warn');return;}
  const date=document.getElementById('offsetDate').value;
  const note=(document.getElementById('offsetNote').value||'').trim();
  const debts=DB.get('debts',[]);
  // FIFO across each side (oldest first by date).
  const sortByOldest=(a,b)=>new Date(a.date||0)-new Date(b.date||0);
  const owedActive=debts.filter(d=>d.person===personName&&!d.settled&&d.direction==='OWED_TO_ME').sort(sortByOldest);
  const iOweActive=debts.filter(d=>d.person===personName&&!d.settled&&d.direction==='I_OWE').sort(sortByOldest);
  const totalOwed=owedActive.reduce((s,d)=>s+(d.total-(d.paid||0)),0);
  const totalIOwe=iOweActive.reduce((s,d)=>s+(d.total-(d.paid||0)),0);
  const maxOffset=Math.min(totalOwed,totalIOwe);
  if(amt>maxOffset+0.0001){showToast('Capped at max offset '+fmt(maxOffset),'info');amt=maxOffset;}
  amt=+amt.toFixed(2);
  // Allocate the same amount to each side, FIFO.
  function allocate(activeDebts,amount){
    let remaining=amount; const touched=[];
    for(const d of activeDebts){
      if(remaining<=0)break;
      const rem=d.total-(d.paid||0);
      if(rem<=0)continue;
      const apply=+Math.min(rem,remaining).toFixed(2);
      d.payments=d.payments||[];
      d.payments.push({amount:apply,date,note:'⚖️ Offset against counter-debt'+(note?' — '+note:''),sourceId:null,kind:'OFFSET'});
      d.paid=+((d.paid||0)+apply).toFixed(2);
      if(d.paid>=d.total){d.settled=true;d.settledAt=new Date().toISOString();}
      touched.push({id:d.id,amount:apply});
      remaining=+(remaining-apply).toFixed(2);
    }
    return touched;
  }
  const a1=allocate(owedActive,amt);
  const a2=allocate(iOweActive,amt);
  DB.set('debts',debts);
  document.querySelectorAll('.modal-overlay').forEach(o=>o.remove());
  showToast(`⚖️ Offset ${fmt(amt)} across ${a1.length+a2.length} debt(s) with ${personName} — no cash moved`,'success');
  render();
}

  const amt=parseFloat(document.getElementById('epAmt').value);
  if(isNaN(amt)||amt<=0){showToast('Valid amount required','warn');return;}
  debts[idx].payments[pi]={...debts[idx].payments[pi],amount:amt,date:document.getElementById('epDate').value,note:document.getElementById('epNote').value,sourceId:document.getElementById('epSource').value||null};
  recomputeDebtPaid(debts[idx]);
  DB.set('debts',debts);document.querySelector('.modal-overlay').remove();showToast('Payment updated','success');render();
}
function deleteDebtPayment(debtId,pi){
  if(!confirm('Delete this payment? Source balance will NOT be auto-reversed.'))return;
  const debts=DB.get('debts',[]);const idx=debts.findIndex(d=>d.id===debtId);
  if(idx<0)return;
  debts[idx].payments.splice(pi,1);
  recomputeDebtPaid(debts[idx]);
  DB.set('debts',debts);showToast('Payment deleted','success');render();
}

function openPayAllDialog(personName){
  const debts=DB.get('debts',[]).filter(d=>d.person===personName&&!d.settled);
  if(debts.length===0){showToast('No active debts for '+personName,'info');return;}
  // Two buckets so the user knows the net effect
  const owed=debts.filter(d=>d.direction==='OWED_TO_ME');
  const iOwe=debts.filter(d=>d.direction==='I_OWE');
  const totalOwed=owed.reduce((s,d)=>s+(d.total-(d.paid||0)),0);
  const totalIOwe=iOwe.reduce((s,d)=>s+(d.total-(d.paid||0)),0);
  const sources=DB.get('sources',[]);
  const today=new Date().toISOString().slice(0,10);
  const html=`<div class="modal-overlay" onclick="if(event.target===this)this.remove()"><div class="modal" style="max-width:480px"><div style="padding:24px">
    <h3 style="font-weight:700;margin-bottom:6px;font-size:16px">💸 Pay All Active — ${personName}</h3>
    <p style="font-size:11px;color:#525252;margin-bottom:14px">Settles every active debt for this person. Each direction needs its own source to track balance correctly.</p>
    <div style="display:flex;flex-direction:column;gap:14px">
      ${owed.length?`<div style="padding:12px;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px"><b style="color:#10b981">📥 They Owe Me (${owed.length})</b><span class="font-mono" style="color:#10b981;font-weight:700">${fmt(totalOwed)}</span></div>
        <label style="font-size:11px;color:#737373;display:block;margin-bottom:4px">Add total to:</label>
        <select id="payAllSrcIn"><option value="">— Don't adjust —</option>${sources.map(s=>`<option value="${s.id}">${s.name} — ${fmt(s.balance)}</option>`).join('')}</select>
      </div>`:''}
      ${iOwe.length?`<div style="padding:12px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px"><b style="color:#ef4444">📤 I Owe Them (${iOwe.length})</b><span class="font-mono" style="color:#ef4444;font-weight:700">${fmt(totalIOwe)}</span></div>
        <label style="font-size:11px;color:#737373;display:block;margin-bottom:4px">Deduct total from:</label>
        <select id="payAllSrcOut"><option value="">— Don't adjust —</option>${sources.map(s=>`<option value="${s.id}">${s.name} — ${fmt(s.balance)}</option>`).join('')}</select>
      </div>`:''}
      <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:#a3a3a3;cursor:pointer"><input type="checkbox" id="payAllCreateTx" checked style="width:auto;cursor:pointer"> Create matching transaction records</label>
      <div><label style="font-size:11px;color:#737373;display:block;margin-bottom:5px;font-weight:500">Date</label><input type="date" id="payAllDate" value="${today}"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:20px;justify-content:flex-end"><button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn btn-primary" onclick="savePayAll('${personName.replace(/'/g,"\\'")}')">✅ Settle All</button></div>
  </div></div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}
function savePayAll(personName){
  const debts=DB.get('debts',[]);
  const sources=DB.get('sources',[]);
  const txs=DB.get('transactions',[]);
  const date=document.getElementById('payAllDate').value;
  const srcIn=document.getElementById('payAllSrcIn')?.value||null;
  const srcOut=document.getElementById('payAllSrcOut')?.value||null;
  const createTx=document.getElementById('payAllCreateTx')?.checked;
  let countSettled=0, totalIn=0, totalOut=0;
  debts.forEach(d=>{
    if(d.person!==personName||d.settled) return;
    const remaining=d.total-(d.paid||0);
    if(remaining<=0){d.settled=true;d.settledAt=new Date().toISOString();return;}
    const isIn=d.direction==='OWED_TO_ME';
    const src=isIn?srcIn:srcOut;
    if(!d.payments)d.payments=[];
    d.payments.push({amount:remaining,date,note:'Pay All Active',sourceId:src||null});
    d.paid=(d.paid||0)+remaining;
    d.settled=true; d.settledAt=new Date().toISOString();
    countSettled++;
    if(isIn) totalIn+=remaining; else totalOut+=remaining;
    if(src){
      const si=sources.findIndex(s=>s.id===src);
      if(si>=0){sources[si].balance+=isIn?remaining:-remaining;}
      if(createTx){
        txs.push({id:DB.id(),type:isIn?'INCOME':'EXPENSE',amount:remaining,category:isIn?'Debt Collected':'Debt Repayment',description:`${personName} — Pay All Active`,sourceId:src,date,debtId:d.id});
      }
    }
  });
  DB.set('debts',debts); DB.set('sources',sources); if(createTx) DB.set('transactions',txs);
  document.querySelector('.modal-overlay').remove();
  showToast(`Settled ${countSettled} debt(s) — +${fmt(totalIn)} / -${fmt(totalOut)}`,'success');
  render();
}

// ===== PWA: install prompt + offline service worker =====
// On Android Chrome / Edge, `beforeinstallprompt` fires when the page is
// install-eligible. We stash the event and show a small floating button so the
// user can install with one tap. The "Add to Home Screen" menu option in the
// browser also works without this button.
let _pwaInstallEvent=null;
function _showPwaInstallButton(){
  if(document.getElementById('pwaInstallBtn'))return;
  const btn=document.createElement('button');
  btn.id='pwaInstallBtn';
  btn.innerHTML='\u2b07\ufe0f Install App';
  btn.title='Install Budget Tracker on your device';
  btn.style.cssText='position:fixed;bottom:14px;right:14px;z-index:9999;padding:10px 14px;border-radius:999px;border:1px solid rgba(124,58,237,.45);background:linear-gradient(135deg,#7C3AED,#6d28d9);color:#fff;font-weight:700;font-size:12px;box-shadow:0 6px 20px rgba(124,58,237,.4);cursor:pointer;font-family:Inter,sans-serif';
  btn.onclick=async()=>{
    if(!_pwaInstallEvent)return;
    btn.disabled=true;
    _pwaInstallEvent.prompt();
    try{const c=await _pwaInstallEvent.userChoice;if(c&&c.outcome==='accepted')btn.remove();else btn.disabled=false;}catch(_){btn.disabled=false;}
    _pwaInstallEvent=null;
  };
  document.body.appendChild(btn);
}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_pwaInstallEvent=e;_showPwaInstallButton();});
window.addEventListener('appinstalled',()=>{const b=document.getElementById('pwaInstallBtn');if(b)b.remove();try{showToast('App installed \u2014 launch it from your home screen!','success');}catch(_){}});

// Register a tiny service worker (built inline as a Blob URL) so the page works
// offline once installed. Service workers ONLY work when the page is served
// over HTTP(S) \u2014 not from `file://`. So this silently no-ops when opened
// locally, and lights up automatically once the file is hosted (GitHub Pages,
// Netlify, a phone web server, etc.).
(function registerSW(){
  if(!('serviceWorker' in navigator))return;
  if(location.protocol!=='http:'&&location.protocol!=='https:')return;
  const swCode=`
    const CACHE='budget-tracker-v1';
    const ASSETS=[self.registration&&self.registration.scope?self.registration.scope:'/'];
    self.addEventListener('install',e=>{self.skipWaiting();e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS).catch(()=>{})));});
    self.addEventListener('activate',e=>{e.waitUntil(clients.claim());});
    self.addEventListener('fetch',e=>{
      if(e.request.method!=='GET')return;
      e.respondWith(
        caches.match(e.request).then(hit=>hit||fetch(e.request).then(res=>{
          const copy=res.clone();
          caches.open(CACHE).then(c=>{try{c.put(e.request,copy);}catch(_){}});
          return res;
        }).catch(()=>caches.match('/')))
      );
    });
  `;
  try{
    const url=URL.createObjectURL(new Blob([swCode],{type:'text/javascript'}));
    navigator.serviceWorker.register(url,{scope:'./'}).catch(()=>{/* blob SW not allowed everywhere; that's fine */});
  }catch(_){}
})();
