<style>
*{box-sizing:border-box;margin:0;padding:0}
[data-hydration-error]{display:none!important}
body{font-family:'Inter',sans-serif;background:#09090b;color:#e5e7eb;overflow-x:hidden}
.font-mono{font-family:'JetBrains Mono',monospace}

/* ===== ANIMATIONS ===== */
@keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideInLeft { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
@keyframes slideInRight { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }
@keyframes scaleIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes pulse-glow { 0%,100%{box-shadow:0 0 8px rgba(124,58,237,.2)} 50%{box-shadow:0 0 20px rgba(124,58,237,.4)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

.animate-fadeInUp{animation:fadeInUp .4s ease-out both}
.animate-fadeIn{animation:fadeIn .3s ease-out both}
.animate-slideInLeft{animation:slideInLeft .4s ease-out both}
.animate-slideInRight{animation:slideInRight .4s ease-out both}
.animate-scaleIn{animation:scaleIn .3s ease-out both}
.stagger-1{animation-delay:.05s}.stagger-2{animation-delay:.1s}.stagger-3{animation-delay:.15s}
.stagger-4{animation-delay:.2s}.stagger-5{animation-delay:.25s}.stagger-6{animation-delay:.3s}

/* ===== GLASSMORPHISM CARDS ===== */
.glass-card{background:rgba(23,23,23,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);border-radius:16px;overflow:hidden;transition:all .25s ease}
.glass-card:hover{border-color:rgba(124,58,237,.15);box-shadow:0 8px 32px rgba(0,0,0,.2)}
.glass-card-sm{background:rgba(23,23,23,.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.05);border-radius:12px;overflow:hidden;transition:all .2s ease}
.glass-card-sm:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);border-color:rgba(124,58,237,.2)}

.card-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
.card-body{padding:16px 20px}

/* ===== GRADIENT ACCENTS ===== */
.gradient-text{background:linear-gradient(135deg,#a78bfa,#7c3aed,#6d28d9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gradient-border{position:relative}.gradient-border::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:1px;background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(168,85,247,.1),transparent);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}

/* ===== INPUTS ===== */
input[type=number],input[type=text],input[type=email],input[type=password],input[type=date],select{
  background:rgba(38,38,38,.8);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;color:#e5e5e5;font-size:13px;width:100%;transition:all .2s ease;outline:none}
input:focus,select:focus{border-color:#7C3AED;box-shadow:0 0 0 3px rgba(124,58,237,.15),0 0 12px rgba(124,58,237,.1)}
select{cursor:pointer}

/* ===== BUTTONS ===== */
.btn{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s ease;display:inline-flex;align-items:center;gap:7px;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.1),transparent);opacity:0;transition:opacity .2s}.btn:hover::after{opacity:1}
.btn-primary{background:linear-gradient(135deg,#7C3AED,#6d28d9);color:#fff;box-shadow:0 2px 12px rgba(124,58,237,.25)}
.btn-primary:hover{box-shadow:0 4px 20px rgba(124,58,237,.4);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-ghost{background:transparent;color:#a3a3a3}.btn-ghost:hover{background:rgba(255,255,255,.05);color:#e5e5e5}
.btn-danger{background:rgba(239,68,68,.08);color:#ef4444;border:1px solid rgba(239,68,68,.15)}.btn-danger:hover{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.3)}

/* ===== TAB BUTTONS ===== */
.tab-btn{padding:8px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .25s ease;background:transparent;color:#a3a3a3}
.tab-btn.active{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.3);color:#a78bfa;box-shadow:0 0 12px rgba(124,58,237,.1)}
.tab-btn:hover:not(.active){background:rgba(255,255,255,.04);color:#d4d4d4}

/* ===== EDITABLE CELLS ===== */
.editable{cursor:pointer;padding:2px 5px;border-radius:6px;transition:all .2s ease;position:relative}
.editable:hover{background:rgba(124,58,237,.1);box-shadow:0 0 0 1px rgba(124,58,237,.2)}
.editable.overridden{box-shadow:0 0 0 1px rgba(124,58,237,.4);background:rgba(124,58,237,.06)}
.edit-input{width:80px;padding:3px 6px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;background:rgba(26,26,46,.9);border:1px solid #7C3AED;border-radius:6px;color:#e5e5e5;box-shadow:0 0 12px rgba(124,58,237,.2)}
.edit-wrap{display:inline-flex;gap:3px;align-items:center;vertical-align:middle}
.edit-calc-btn{background:rgba(168,85,247,.18);color:#a78bfa;border:1px solid rgba(168,85,247,.35);border-radius:6px;padding:2px 6px;font-size:11px;cursor:pointer;line-height:1.1;font-weight:600;transition:background .15s ease}
.edit-calc-btn:hover{background:rgba(168,85,247,.3)}
@media(max-width:768px){.edit-input{width:90px;padding:5px 7px;font-size:13px}.edit-calc-btn{padding:4px 8px;font-size:13px}}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal{background:rgba(23,23,23,.95);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:20px;width:90%;max-width:440px;max-height:90vh;overflow-y:auto;animation:scaleIn .25s ease;box-shadow:0 24px 48px rgba(0,0,0,.4)}

/* ===== PERF: disable repeat stagger animations after first paint ===== */
.no-anim .animate-fadeInUp,.no-anim .animate-fadeIn,.no-anim .animate-slideInLeft,.no-anim .animate-slideInRight,.no-anim .animate-scaleIn{animation:none!important}
.no-anim [class*="stagger-"]{animation:none!important}

/* ===== PERF: drop expensive backdrop-filter on mobile / low-end ===== */
@media(max-width:768px){
  .glass-card,.glass-card-sm,.sidebar,.mobile-nav,.calc-drawer,.modal,.modal-overlay,.auth-card{backdrop-filter:none!important;-webkit-backdrop-filter:none!important}
  .glass-card{background:rgba(23,23,23,.94)}
  .glass-card-sm{background:rgba(23,23,23,.92)}
  .calc-drawer{background:rgba(17,17,17,.99)}
  .modal{background:rgba(23,23,23,.99)}
  .modal-overlay{background:rgba(0,0,0,.75)}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}

/* ===== TABLE ===== */
table{border-collapse:collapse;width:100%}
th,td{padding:10px 7px;text-align:right;font-size:11px;white-space:nowrap}
th{color:#737373;font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.5px}
tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s}
tbody tr:hover{background:rgba(255,255,255,.02)}
.highlighted-row{background:rgba(139,92,246,.05)!important;box-shadow:inset 3px 0 0 0 #7c3aed}

/* ===== PROJECTION TABLE (grouped columns) ===== */
/* ===== Projection edit cell reset button (mobile-friendly alt to right-click) ===== */
.ec-reset{display:inline-block;margin-left:3px;cursor:pointer;color:#a78bfa;background:rgba(168,85,247,.14);border:1px solid rgba(168,85,247,.3);border-radius:5px;padding:1px 5px;font-size:9px;font-weight:700;vertical-align:middle;line-height:1.2;transition:background .15s ease}
.ec-reset:hover{background:rgba(168,85,247,.28)}
@media(max-width:768px){.ec-reset{padding:2px 7px;font-size:11px}}

/* ===== Projection filter toolbar ===== */
.proj-filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 12px;margin-bottom:10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:12px}
.proj-filter-bar .pfb-label{font-size:10px;color:#737373;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.proj-filter-bar select{width:auto;font-size:11px;padding:5px 10px}
.proj-filter-bar .pfb-spacer{flex:1}
.proj-filter-bar .chip{font-size:11px;padding:5px 10px}
.proj-filter-bar .pfb-clear{font-size:11px;color:#ef4444;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:5px 10px;cursor:pointer;font-weight:600}
.proj-filter-bar .pfb-clear:hover{background:rgba(239,68,68,.2)}
.proj-empty{padding:24px;text-align:center;color:#737373;font-size:12px}
.proj-empty b{color:#a78bfa}

/* ===== PROJECTION TABLE: hide on mobile in favor of card view ===== */
.proj-table-wrap{overflow-x:auto;padding:12px}
.proj-cards-wrap{display:none;flex-direction:column;gap:12px;padding:4px 2px}
.proj-card{background:rgba(23,23,23,.7);border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden;transition:border-color .2s ease}
.proj-card.current{border-color:rgba(168,85,247,.45);box-shadow:0 0 0 1px rgba(168,85,247,.2)}
.proj-card.negative{border-color:rgba(239,68,68,.35)}
.proj-card .pc-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:linear-gradient(180deg,rgba(255,255,255,.04),transparent);border-bottom:1px solid rgba(255,255,255,.06)}
.proj-card .pc-month{font-size:14px;font-weight:800;letter-spacing:-.2px;display:flex;align-items:center;gap:8px}
.proj-card .pc-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.4px}
.proj-card .pc-pill.on{background:rgba(16,185,129,.14);color:#10b981;border:1px solid rgba(16,185,129,.25)}
.proj-card .pc-pill.neg{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.28)}
.proj-card .pc-pill.cur{background:rgba(168,85,247,.16);color:#c4b5fd;border:1px solid rgba(168,85,247,.32)}
.proj-card .pc-body{padding:10px 12px;display:flex;flex-direction:column;gap:10px}
.proj-card .pc-period{border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:9px 10px;background:rgba(255,255,255,.015)}
.proj-card .pc-period.p15{border-left:3px solid #60a5fa;background:linear-gradient(90deg,rgba(59,130,246,.05),transparent)}
.proj-card .pc-period.pend{border-left:3px solid #a78bfa;background:linear-gradient(90deg,rgba(139,92,246,.05),transparent)}
.proj-card .pc-period-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.proj-card .pc-period-title{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.proj-card .pc-period-rem{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800}
.proj-card .pc-row{display:flex;justify-content:space-between;align-items:center;padding:5px 2px;font-size:11px}
.proj-card .pc-row+.pc-row{border-top:1px dashed rgba(255,255,255,.04)}
.proj-card .pc-row .lbl{color:#737373;font-weight:600;display:flex;align-items:center;gap:5px}
.proj-card .pc-row .val{font-family:'JetBrains Mono',monospace;font-weight:600}
.proj-card .pc-foot{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 12px;border-top:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02)}
.proj-card .pc-foot .fi{display:flex;flex-direction:column;gap:2px;text-align:center;padding:4px 2px}
.proj-card .pc-foot .fi .l{font-size:9px;color:#525252;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.proj-card .pc-foot .fi .v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:800}
@media(max-width:768px){
  .proj-table-wrap{display:none}
  .proj-cards-wrap{display:flex}
  .proj-mobile-tools{display:flex!important}
  .proj-card .pc-foot{grid-template-columns:1fr 1fr 1fr;gap:4px}
  .proj-card .pc-foot .fi .v{font-size:12px}
}

/* ===== LANDSCAPE TABLE OVERLAY (mobile only) ===== */
.proj-mobile-tools{display:none;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;padding:8px 4px 12px}
.proj-mobile-tools .pmt-info{font-size:10px;color:#737373}
.proj-mobile-tools button{background:linear-gradient(135deg,rgba(168,85,247,.18),rgba(124,58,237,.1));color:#c4b5fd;border:1px solid rgba(168,85,247,.32);padding:8px 14px;border-radius:10px;font-weight:700;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:6px}
.proj-mobile-tools button:hover{background:linear-gradient(135deg,rgba(168,85,247,.28),rgba(124,58,237,.16))}

.proj-landscape-overlay{position:fixed;inset:0;z-index:9999;background:#0a0a0a;overflow:hidden}
.proj-landscape-overlay .pl-bar{position:absolute;top:0;left:0;right:0;z-index:3;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:linear-gradient(180deg,rgba(0,0,0,.75),transparent);pointer-events:none}
.proj-landscape-overlay .pl-bar > *{pointer-events:auto}
.proj-landscape-overlay .pl-hint{font-size:11px;color:#a3a3a3;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.08);padding:4px 10px;border-radius:99px}
.proj-landscape-overlay .pl-close{background:rgba(239,68,68,.18);color:#ef4444;border:1px solid rgba(239,68,68,.38);padding:7px 13px;border-radius:10px;font-weight:700;cursor:pointer;font-size:13px}
.proj-landscape-overlay .pl-close:hover{background:rgba(239,68,68,.28)}
.proj-landscape-overlay .pl-stage{position:absolute;inset:0;overflow:auto;-webkit-overflow-scrolling:touch;padding:50px 12px 16px}
.proj-landscape-overlay .pl-stage .proj-table-wrap{display:block!important;overflow:visible;padding:0}
.proj-landscape-overlay .pl-stage .proj-table{font-size:11px}
.proj-landscape-overlay .pl-stage .proj-table th,
.proj-landscape-overlay .pl-stage .proj-table td{padding:6px 8px}
/* When real orientation lock is unavailable (iOS Safari, etc.), rotate visually */
.proj-landscape-overlay.forced-rotate .pl-stage{
  position:absolute;
  top:50%;left:50%;
  width:100vh;height:100vw;
  transform:translate(-50%,-50%) rotate(90deg);
  transform-origin:center center;
  padding:54px 16px 20px;
}
.proj-landscape-overlay.forced-rotate .pl-bar{
  /* keep bar readable in rotated mode */
  transform:rotate(0);
}


.proj-table{border-collapse:separate;border-spacing:0}

<script>
// ===== CRYPTO HELPERS =====
async function hashPassword(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ===== AUTH LAYER =====
const Auth = {
  getUsers() { try { return JSON.parse(localStorage.getItem('bt__users')||'[]'); } catch { return []; } },
  setUsers(u) { localStorage.setItem('bt__users', JSON.stringify(u)); },
  getCurrentUserId() { return localStorage.getItem('bt__currentUser')||null; },
  setCurrentUserId(id) { if(id) localStorage.setItem('bt__currentUser',id); else localStorage.removeItem('bt__currentUser'); if(typeof DB!=='undefined')DB.invalidate(); },
  currentUser() { const id=this.getCurrentUserId(); return id?this.getUsers().find(u=>u.id===id):null; },
  async signup(name,email,password) {
    const users = this.getUsers();
    if(users.find(u=>u.email.toLowerCase()===email.toLowerCase())) return {ok:false,msg:'Email already registered'};
    if(password.length<4) return {ok:false,msg:'Password must be at least 4 characters'};
    const hash = await hashPassword(password);
    const user = {id:Date.now().toString(36)+Math.random().toString(36).slice(2,6), name, email:email.toLowerCase(), passwordHash:hash, createdAt:new Date().toISOString()};
    users.push(user);
    this.setUsers(users);
    this.setCurrentUserId(user.id);
    FilePersist.autoSave();
    return {ok:true,user};
  },
  async login(email,password) {
    const users = this.getUsers();
    const hash = await hashPassword(password);
    const user = users.find(u=>u.email.toLowerCase()===email.toLowerCase()&&u.passwordHash===hash);
    if(!user) return {ok:false,msg:'Invalid email or password'};
    this.setCurrentUserId(user.id);
    return {ok:true,user};
  },
  logout() { this.setCurrentUserId(null); render(); }
};

// ===== DATA LAYER =====
const DB = {
  _cache: new Map(),
  _prefix() { const uid=Auth.getCurrentUserId(); return uid?'bt_'+uid+'_':'bt__anon_'; },
  get(k, def) {
    const ck=this._prefix()+k;
    if(this._cache.has(ck)){const v=this._cache.get(ck);return v===undefined?def:v;}
    try { const raw=localStorage.getItem(ck); const v=raw?JSON.parse(raw):def; this._cache.set(ck,v); return v; } catch { return def; }
  },
  set(k, v) {
    const ck=this._prefix()+k;
    try { localStorage.setItem(ck, JSON.stringify(v)); this._cache.set(ck,v); FilePersist.autoSave(); } catch {}
  },
  remove(k) { const ck=this._prefix()+k; this._cache.delete(ck); localStorage.removeItem(ck); },
  invalidate() { this._cache.clear(); },
  id() { return Date.now().toString(36)+Math.random().toString(36).slice(2,8); },
  getAllUserData() {
    const prefix = this._prefix();
    const data = {};
    for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith(prefix)) data[k.slice(prefix.length)]=localStorage.getItem(k);}
    return data;
  },
  setAllUserData(data) {
    const prefix = this._prefix();

// ===== FILE PERSISTENCE =====
const FilePersist = {
  fileHandle: null,
  supported: typeof window.showSaveFilePicker === 'function',
  dirty: false, saving: false, lastSave: null,
  async linkFile() {
    if(!this.supported) { showToast('File System Access API not supported. Use Export/Import instead.','warn'); return false; }
    try {
      this.fileHandle = await window.showSaveFilePicker({suggestedName:'budget-tracker-data.json',types:[{description:'JSON',accept:{'application/json':['.json']}}]});
      await this.saveNow(); return true;
    } catch(e) { if(e.name!=='AbortError') showToast('Error: '+e.message,'error'); return false; }
  },
  async openFile() {
    if(!this.supported) { showToast('File System Access API not supported. Use Import instead.','warn'); return false; }
    try {
      const [handle] = await window.showOpenFilePicker({types:[{description:'JSON',accept:{'application/json':['.json']}}]});
      const file = await handle.getFile(); const text = await file.text(); const data = JSON.parse(text);
      if(data.users) Auth.setUsers(data.users);
      if(data.userData) Object.entries(data.userData).forEach(([uid,udata])=>{Object.entries(udata).forEach(([k,v])=>localStorage.setItem('bt_'+uid+'_'+k,v));});
      if(data.currentUser) Auth.setCurrentUserId(data.currentUser);
      this.fileHandle=handle; this.lastSave=new Date(); render(); return true;
    } catch(e) { if(e.name!=='AbortError') showToast('Error loading file: '+e.message,'error'); return false; }
  },
  async saveNow() {
    if(!this.fileHandle||this.saving) return;
    this.saving=true;
    try {
      const writable=await this.fileHandle.createWritable();
      await writable.write(JSON.stringify(this._gatherAll(),null,2));
      await writable.close();
      this.lastSave=new Date(); this.dirty=false;
    } catch(e) { console.warn('Auto-save failed:',e); }
    this.saving=false;
  },
  autoSave() {
    if(!this.fileHandle){this.dirty=true;return;}
    this.dirty=true; clearTimeout(this._timer);
    this._timer=setTimeout(()=>this.saveNow(),1500);
  },
  _gatherAll() {
    const users=Auth.getUsers(); const userData={};
    users.forEach(u=>{const prefix='bt_'+u.id+'_';const udata={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith(prefix))udata[k.slice(prefix.length)]=localStorage.getItem(k);}userData[u.id]=udata;});
    return {version:2,exportedAt:new Date().toISOString(),users,userData,currentUser:Auth.getCurrentUserId()};
  },
  _timer:null
};

// ===== BILL PAYMENT HELPERS (supports partial payments + legacy bool) =====
function getBillPaidAmount(bill,paidMap){
  const v=paidMap?paidMap[bill.id]:undefined;
  if(v===true) return bill.amount;        // legacy: stored as boolean
  if(typeof v==='number') return Math.max(0,Math.min(v,bill.amount));
  return 0;
}
function getBillRemaining(bill,paidMap){
  return Math.max(0,bill.amount-getBillPaidAmount(bill,paidMap));
}
function isBillFullyPaid(bill,paidMap){
  return getBillPaidAmount(bill,paidMap)>=bill.amount;
}

// ===== CURRENT PERIOD (auto by date, but user can override per month) =====
// Returns '15' (Before 15th) or 'END' (Before End of month).
// Auto rule: day 1–14 → Before 15th; day 15–end of month → Before End.
function getCurrentPeriod(year,month){
  const overrides=DB.get('periodOverrides',{});
  const k=year+'_'+month;
  if(overrides[k]==='15'||overrides[k]==='END') return overrides[k];
  const now=new Date();
  if(year===now.getFullYear()&&month===now.getMonth()){
    return now.getDate()<15?'15':'END';
  }
  return '15';
}
function setCurrentPeriod(year,month,period){
  const overrides=DB.get('periodOverrides',{});
  const k=year+'_'+month;
  const now=new Date();
  const auto=(year===now.getFullYear()&&month===now.getMonth())?(now.getDate()<15?'15':'END'):'15';
  const prev=getCurrentPeriod(year,month);
  // ===== Snapshot rule: only FORWARD moves (15 \u2192 END) preserve the previous
  // period's value. Backward moves (END \u2192 15) recalculate \u2014 the user wants the
  // freeze to apply only to succeeding periods, never to "rewind" old values.
  if(prev!==period&&year===now.getFullYear()&&month===now.getMonth()){
    try{
      const snapAll=DB.get('periodSnap_'+year,{});
      const cur=snapAll[month]||{};
      if(prev==='15'&&period==='END'){
        // Moving forward: freeze the Before-15th value we were just showing.
        const sources=DB.get('sources',[]);
        const curBal=sources.reduce((s,x)=>s+x.balance,0);
        const billsAll=DB.get('bills_'+year,[]);
        const forMonth=arr=>arr.filter(b=>b.recurring!==false||b.month===month);
        const pm=DB.get('billPaid_'+year+'_'+month,{});
        const carryover=getCarryoverUnpaidBills(year,month,prev);
        const bills15=forMonth(billsAll.filter(b=>b.period==='BEFORE_15TH'));
        const unpaid15=bills15.reduce((s,b)=>s+getBillRemaining(b,pm),0)+(carryover&&carryover.total?carryover.total:0);
        cur.r15=+(curBal-unpaid15).toFixed(2);
        // Stale END snapshot (if any) is cleared so a later forward switch starts fresh.
        delete cur.rEnd;
      } else if(prev==='END'&&period==='15'){
        // Moving backward: clear any snapshots \u2014 both r15 and rEnd should recalculate.
        delete cur.r15;
        delete cur.rEnd;
      }
      snapAll[month]=cur;
      DB.set('periodSnap_'+year,snapAll);
    }catch(e){/* non-fatal */}
  }
  if(period===auto) delete overrides[k]; else overrides[k]=period;
  DB.set('periodOverrides',overrides);
  showToast('Period set to '+(period==='15'?'Before 15th':'Before End of Month'),'success');
  render();
}

// ===== CARRYOVER UNPAID BILLS =====
// Returns {total, items:[{month,period,bill,remaining}]} for any unpaid bills
// from periods *earlier* than the current period within projYear. When the
// current period is BEFORE_END, the same month's BEFORE_15TH bills are also
// considered carryover.
function getCarryoverUnpaidBills(year,curMonth,curPeriod){
  const bills=DB.get('bills_'+year,[]);
  let total=0; const items=[];
  for(let m=0;m<curMonth;m++){
    const pm=DB.get('billPaid_'+year+'_'+m,{});
    bills.filter(b=>b.recurring!==false||b.month===m).forEach(b=>{
      const rem=getBillRemaining(b,pm);
      if(rem>0){total+=rem;items.push({month:m,period:b.period,bill:b,remaining:rem});}
    });
  }
  if(curPeriod==='END'){
    const pm=DB.get('billPaid_'+year+'_'+curMonth,{});
    bills.filter(b=>(b.recurring!==false||b.month===curMonth)&&b.period==='BEFORE_15TH').forEach(b=>{
      const rem=getBillRemaining(b,pm);
      if(rem>0){total+=rem;items.push({month:curMonth,period:'BEFORE_15TH',bill:b,remaining:rem});}
    });
  }
  return {total,items};
}

  const remMonthBills=monthBills.reduce((s,b)=>s+getBillRemaining(b,paidMap),0);
  const billPct=totMonthBills>0?Math.round((totMonthBills-remMonthBills)/totMonthBills*100):0;
  // Debts summary
  const owedToMe=debts.filter(d=>!d.settled&&d.direction==='OWED_TO_ME').reduce((s,d)=>s+(d.total-(d.paid||0)),0);
  const iOwe=debts.filter(d=>!d.settled&&d.direction==='I_OWE').reduce((s,d)=>s+(d.total-(d.paid||0)),0);
  const recent=txs.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
  const sortedSources=sources.slice().sort((a,b)=>b.balance-a.balance);
  const maxSrc=Math.max(...sortedSources.map(s=>Math.abs(s.balance)),1);
  // Upcoming bills (next 7 days within current month)
  const today=new Date().getDate();
  const upcoming=monthBills.filter(b=>b.dueDay&&b.dueDay>=today&&b.dueDay<=today+7&&getBillRemaining(b,paidMap)>0).sort((a,b)=>a.dueDay-b.dueDay).slice(0,4);
  const userName=Auth.currentUser()?.name||'User';
  const hour=new Date().getHours();
  const greeting=hour<5?'Working late':hour<12?'Good morning':hour<18?'Good afternoon':'Good evening';
  return `
    <div class="animate-fadeInUp" style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;flex-wrap:wrap;gap:14px">
      <div>
        <p style="font-size:12px;color:#525252;margin-bottom:4px;font-weight:500">${greeting},</p>
        <h1 style="font-size:30px;font-weight:800;letter-spacing:-.7px" class="gradient-text">${userName}</h1>
        <p style="color:#525252;font-size:12px;margin-top:4px">${MONTHS[mo]} ${yr} • ${new Date().toLocaleDateString(undefined,{weekday:'long'})}</p>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="openTxDialog()">+ Transaction</button>
        <button class="btn btn-ghost btn-sm" style="border:1px solid rgba(255,255,255,.08)" onclick="openSourceDialog()">+ Source</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px">
      ${statCard('Total Balance',fmt(totalBal),'💰',totalBal>=0?'#10b981':'#ef4444','stagger-1')}
      ${statCard('Income (YTD)',fmt(incYTD),'📈','#10b981','stagger-2')}
      ${statCard('Expenses (YTD)',fmt(expYTD),'📉','#ef4444','stagger-3')}
      ${statCard('Net Savings',(incYTD-expYTD>=0?'+':'')+fmt(incYTD-expYTD),'✨',incYTD-expYTD>=0?'#10b981':'#ef4444','stagger-4')}
    </div>
    <div class="glass-card animate-fadeInUp stagger-2" style="margin-bottom:18px"><div class="card-body" style="padding:14px 18px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
        <span style="font-weight:700;font-size:13px">📋 ${MONTHS[mo]} Snapshot</span>
        <button class="btn btn-ghost btn-sm" style="font-size:10px;border:1px solid rgba(255,255,255,.06)" onclick="navigate('transactions')">View all →</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px">
        <div><div style="font-size:10px;color:#525252;text-transform:uppercase;letter-spacing:.5px;font-weight:600">Income</div><div class="font-mono" style="font-size:18px;font-weight:700;color:#10b981;margin-top:2px">${fmt(incMo)}</div></div>
        <div><div style="font-size:10px;color:#525252;text-transform:uppercase;letter-spacing:.5px;font-weight:600">Expenses</div><div class="font-mono" style="font-size:18px;font-weight:700;color:#ef4444;margin-top:2px">${fmt(expMo)}</div></div>
        <div><div style="font-size:10px;color:#525252;text-transform:uppercase;letter-spacing:.5px;font-weight:600">Net</div><div class="font-mono" style="font-size:18px;font-weight:700;color:${incMo-expMo>=0?'#10b981':'#ef4444'};margin-top:2px">${incMo-expMo>=0?'+':''}${fmt(incMo-expMo)}</div></div>
        <div><div style="font-size:10px;color:#525252;text-transform:uppercase;letter-spacing:.5px;font-weight:600">Bills Paid</div><div class="font-mono" style="font-size:18px;font-weight:700;color:${billPct>=100?'#10b981':billPct>0?'#fbbf24':'#ef4444'};margin-top:2px">${billPct}%</div><div class="bill-bar" style="margin-top:5px"><span style="width:${billPct}%"></span></div></div>

    </div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px">
      <div class="glass-card animate-fadeInUp stagger-3">

          ${sources.length>6?`<button class="btn btn-ghost btn-sm" style="width:100%;margin-top:8px;font-size:11px;border:1px dashed rgba(255,255,255,.08)" onclick="navigate('sources')">+ ${sources.length-6} more …</button>`:''}

          ${recent.length===0?`<div class="empty-state"><span class="ico">📝</span><span class="title">No transactions yet</span><span class="desc">Add income or expenses to see them here.</span><button class="btn btn-primary btn-sm" style="margin-top:6px" onclick="openTxDialog()">+ Add Transaction</button></div>`:recent.map(t=>{
            const isInc=t.type==='INCOME';
            const ic=catIcon(t.category);
            return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">
              <span style="width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;background:${isInc?'rgba(16,185,129,.1)':'rgba(239,68,68,.08)'};border:1px solid ${isInc?'rgba(16,185,129,.22)':'rgba(239,68,68,.18)'};flex-shrink:0">${ic}</span>
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description||t.category}</div>
                <div style="font-size:10px;color:#525252">${t.category} • ${new Date(t.date).toLocaleDateString(undefined,{month:'short',day:'numeric'})}</div>
              </div>
              <span class="font-mono" style="font-weight:700;font-size:13px;color:${isInc?'#10b981':'#ef4444'};flex-shrink:0">${isInc?'+':'−'}${fmt(t.amount)}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;margin-top:16px">
      ${upcoming.length>0?`<div class="glass-card animate-fadeInUp stagger-5">
        <div class="card-header" style="font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;justify-content:space-between"><span>⏰ Upcoming Bills</span><button class="btn btn-ghost btn-sm" style="font-size:10px" onclick="navigate('projections')">All bills →</button></div>
        <div class="card-body">${upcoming.map(b=>{
          const days=b.dueDay-today;
          const urgClass=days===0?'due-today':days<=3?'due-soon':'due-ok';
          const label=days===0?'⏰ Today':days===1?'Tomorrow':'In '+days+'d';
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:8px">
            <div style="display:flex;align-items:center;gap:10px;min-width:0;flex:1"><span style="font-size:16px">${catIcon(b.category)}</span>
              <div style="min-width:0"><div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.name}</div><div style="font-size:10px;color:#525252"><span class="due-badge ${urgClass}">${label}</span></div></div></div>
            <span class="font-mono" style="font-weight:700;font-size:13px;color:#ef4444;flex-shrink:0">${fmt(getBillRemaining(b,paidMap))}</span>
          </div>`;
        }).join('')}</div></div>`:''}
      ${(owedToMe>0||iOwe>0)?`<div class="glass-card animate-fadeInUp stagger-5">
        <div class="card-header" style="font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;justify-content:space-between"><span>🤝 Debts at a Glance</span><button class="btn btn-ghost btn-sm" style="font-size:10px" onclick="navigate('debts')">Open Debt Tracker →</button></div>
        <div class="card-body">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div style="padding:12px;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.18);border-radius:12px">
              <div style="font-size:10px;color:#10b981;font-weight:700;letter-spacing:.5px;text-transform:uppercase">Owed to Me</div>
              <div class="font-mono" style="font-size:18px;font-weight:700;color:#10b981;margin-top:4px">${fmt(owedToMe)}</div>
            </div>
            <div style="padding:12px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.18);border-radius:12px">
              <div style="font-size:10px;color:#ef4444;font-weight:700;letter-spacing:.5px;text-transform:uppercase">I Owe</div>
              <div class="font-mono" style="font-size:18px;font-weight:700;color:#ef4444;margin-top:4px">${fmt(iOwe)}</div>
            </div>
          </div>
          <div style="font-size:11px;color:${owedToMe-iOwe>=0?'#10b981':'#ef4444'};font-weight:700;text-align:center;margin-top:10px">Net position: ${owedToMe-iOwe>=0?'+':''}${fmt(owedToMe-iOwe)}</div>
        </div></div>`:''}
    </div>`;
}
function statCard(title,value,icon,color,stagger) {
  return `<div class="glass-card-sm stat-glow animate-fadeInUp ${stagger||''}" style="--glow-color:${color}"><div class="card-body" style="display:flex;align-items:center;gap:12px">
    <div style="width:42px;height:42px;border-radius:12px;background:${color}15;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${icon}</div>
    <div><div style="font-size:11px;color:#525252;font-weight:500;text-transform:uppercase;letter-spacing:.5px">${title}</div><div class="font-mono" style="font-size:17px;font-weight:700;color:${color};margin-top:2px">${value}</div></div>
  </div></div>`;
}

// ===== SOURCES =====
function renderSources(){
  const sources=DB.get('sources',[]);
  const txs=DB.get('transactions',[]);
  const total=sources.reduce((s,x)=>s+x.balance,0);
  const positives=sources.filter(s=>s.balance>=0).reduce((s,x)=>s+x.balance,0);
  const negatives=sources.filter(s=>s.balance<0).reduce((s,x)=>s+x.balance,0);
  const sortedSources=sources.slice().sort((a,b)=>b.balance-a.balance);
  const maxBal=Math.max(...sortedSources.map(s=>Math.abs(s.balance)),1);
  const TINTS={'Wallet':'rgba(251,191,36,.18)','Bank Account':'rgba(59,130,246,.2)','Debit Card':'rgba(6,182,212,.18)','Credit Card':'rgba(239,68,68,.18)','Savings':'rgba(16,185,129,.2)','E-Wallet':'rgba(168,85,247,.2)','Other':'rgba(124,58,237,.18)'};
  return `
    <div class="animate-fadeInUp" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px">
      <div><h1 style="font-size:26px;font-weight:800;letter-spacing:-.5px">Money Sources</h1><p style="color:#525252;font-size:13px;margin-top:2px">${sources.length} source${sources.length!==1?'s':''} • Total: <span class="font-mono" style="color:${total>=0?'#10b981':'#ef4444'};font-weight:700">${fmt(total)}</span></p></div>

      ${statCard('Total Balance',fmt(total),'💰',total>=0?'#10b981':'#ef4444','stagger-1')}
      ${statCard('Assets',fmt(positives),'✨','#10b981','stagger-2')}

    ${sources.length===0

      : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">
      ${sortedSources.map((s,i)=>{
        const txCount=txs.filter(t=>t.sourceId===s.id).length;
        const tint=TINTS[s.type]||'rgba(124,58,237,.18)';
        const pct=Math.abs(s.balance)/maxBal*100;
        return `<div class="source-card animate-fadeInUp stagger-${Math.min(i+1,6)}${s.balance<0?' negative':''}" style="--src-tint:${tint}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;position:relative;z-index:2">
            <div style="display:flex;align-items:center;gap:12px;min-width:0;flex:1">
              <div class="source-card-icon">${SOURCE_ICONS[s.type]||'💰'}</div>
              <div style="min-width:0">
                <div style="font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</div>

          <div class="source-bar" style="position:relative;z-index:2"><span style="width:${pct}%;background:${s.balance>=0?'linear-gradient(90deg,#059669,#34d399)':'linear-gradient(90deg,#dc2626,#f87171)'}"></span></div>

// ===== TRANSACTIONS =====
function renderTransactions(){
  const txs=DB.get('transactions',[]);const sources=DB.get('sources',[]);
  const searchLower=txSearch.toLowerCase();
  let filtered=txs.filter(t=>{
    const d=new Date(t.date);
    if(d.getMonth()!==txFilterMonth||d.getFullYear()!==txFilterYear)return false;
    if(txFilterType!=='ALL'&&t.type!==txFilterType)return false;
    if(searchLower){
      const src=(sources.find(s=>s.id===t.sourceId)||{}).name||'';
      const hay=((t.category||'')+' '+(t.description||'')+' '+src).toLowerCase();
      if(!hay.includes(searchLower))return false;
    }
    return true;
  });
  // Sort
  if(txSort==='date-desc') filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));
  else if(txSort==='date-asc') filtered.sort((a,b)=>new Date(a.date)-new Date(b.date));
  else if(txSort==='amount-desc') filtered.sort((a,b)=>b.amount-a.amount);
  else if(txSort==='amount-asc') filtered.sort((a,b)=>a.amount-b.amount);
  const inc=filtered.filter(t=>t.type==='INCOME').reduce((s,t)=>s+t.amount,0);
  const exp=filtered.filter(t=>t.type==='EXPENSE').reduce((s,t)=>s+t.amount,0);
  const net=inc-exp;
  const avg=filtered.length>0?(inc+exp)/filtered.length:0;
  // Group rendering
  function renderGrouped(){
    if(filtered.length===0) return '<p class="text-muted" style="text-align:center;padding:28px;font-size:13px">No transactions found</p>';
    if(txGroupBy==='none') return filtered.map(t=>txRow(t)).join('');
    if(txGroupBy==='category'){
      const groups={};
      filtered.forEach(t=>{const k=t.category||'Other';(groups[k]=groups[k]||[]).push(t);});
      return Object.entries(groups).sort((a,b)=>b[1].length-a[1].length).map(([cat,list])=>{
        const gInc=list.filter(t=>t.type==='INCOME').reduce((s,t)=>s+t.amount,0);
        const gExp=list.filter(t=>t.type==='EXPENSE').reduce((s,t)=>s+t.amount,0);
        const gNet=gInc-gExp;
        return `<div class="tx-date-group">
          <div class="tx-date-header"><div><span class="label">${catIcon(cat)} ${cat}</span><span class="sub">${list.length} tx</span></div>
            <span class="font-mono" style="font-size:11px;color:${gNet>=0?'#10b981':'#ef4444'};font-weight:700">${gNet>=0?'+':''}${fmt(gNet)}</span></div>
          ${list.map(t=>txRow(t)).join('')}
        </div>`;
      }).join('');
    }
    // group by date
    const groups={};
    filtered.forEach(t=>{const k=(t.date||'').slice(0,10);(groups[k]=groups[k]||[]).push(t);});
    const today=new Date();const yTd=today.toISOString().slice(0,10);
    const yest=new Date(today.getTime()-86400000).toISOString().slice(0,10);
    function dateLabel(k){
      if(k===yTd) return 'Today';
      if(k===yest) return 'Yesterday';
      const d=new Date(k+'T12:00:00');
      const sameYear=d.getFullYear()===today.getFullYear();
      return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric',year:sameYear?undefined:'numeric'});
    }
    return Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0])).map(([dt,list])=>{
      const gInc=list.filter(t=>t.type==='INCOME').reduce((s,t)=>s+t.amount,0);
      const gExp=list.filter(t=>t.type==='EXPENSE').reduce((s,t)=>s+t.amount,0);
      const gNet=gInc-gExp;
      return `<div class="tx-date-group">
        <div class="tx-date-header"><div><span class="label">${dateLabel(dt)}</span><span class="sub">${list.length} tx</span></div>
          <span class="font-mono" style="font-size:11px;color:${gNet>=0?'#10b981':'#ef4444'};font-weight:700">${gNet>=0?'+':''}${fmt(gNet)}</span></div>
        ${list.map(t=>txRow(t)).join('')}
      </div>`;
    }).join('');
  }
  function txRow(t){
    const src=sources.find(s=>s.id===t.sourceId);
    const isInc=t.type==='INCOME';
    const ic=catIcon(t.category);
    const time=new Date(t.date).toLocaleDateString(undefined,{month:'short',day:'numeric'});
    return `<div class="tx-row ${isInc?'income':'expense'}">
      <div class="tx-icon ${isInc?'income':'expense'}">${ic}</div>
      <div class="tx-body">
        <div class="tx-title">${t.description||t.category}<span class="tx-cat-tag">${t.category||'Other'}</span></div>
        <div class="tx-sub">
          <span>${time}</span>
          ${src?`<span>•</span><span>${SOURCE_ICONS[src.type]||'💰'} ${src.name}</span>`:''}
          ${t.debtId||t.debtGroupId?'<span>•</span><span style="color:#a78bfa">🤝 from debt</span>':''}
          ${t.billId?'<span>•</span><span style="color:#60a5fa">🧾 from bill</span>':''}
        </div>
      </div>

      <select onchange="txFilterYear=+this.value;render()" style="width:auto;font-size:12px">${[currentYear-1,currentYear,currentYear+1].map(y=>`<option value="${y}"${y===txFilterYear?' selected':''}>${y}</option>`).join('')}</select>

// ===== PROJECTIONS (FIXED LOGIC) =====
function renderProjections(){
  const proj=DB.get('proj_'+projYear,{initialCash:0,salary1:0,salary2:0,otherInc1:0,otherInc2:0,targetSavings:0});
  const bills=DB.get('bills_'+projYear,[]);
  const overrides=DB.get('overrides_'+projYear,{});
  const txs=DB.get('transactions',[]);
  const sources=DB.get('sources',[]);
  const curBal=sources.reduce((s,x)=>s+x.balance,0);
  const now=new Date();
  const curMonth=now.getMonth();
  const curPeriod=getCurrentPeriod(projYear,curMonth);
  const isCurYear=projYear===now.getFullYear();
  // Unpaid bills from earlier periods (carryover) within the projection year.
  const carryover=getCarryoverUnpaidBills(projYear,curMonth,curPeriod);

  // Helper: filter bills applicable to a given month (recurring + one-time matching that month)
  function billsForMonth(allBills,monthIdx){return allBills.filter(b=>b.recurring!==false||b.month===monthIdx);}
  const bills15All=bills.filter(b=>b.period==='BEFORE_15TH');
  const billsEndAll=bills.filter(b=>b.period==='BEFORE_END');
  // Global totals for Setup tab display (all recurring + current month one-time)
  const bills15=billsForMonth(bills15All,curMonth);
  const billsEnd=billsForMonth(billsEndAll,curMonth);
  const totBills15=bills15.reduce((s,b)=>s+b.amount,0);
  const totBillsEnd=billsEnd.reduce((s,b)=>s+b.amount,0);
  // Per-month paid status: only deduct unpaid bills for the current month
  const paidMap=DB.get('billPaid_'+projYear+'_'+curMonth,{});
  const unpaidBills15=bills15.reduce((s,b)=>s+getBillRemaining(b,paidMap),0)+(isCurYear&&curPeriod==='15'?carryover.total:0);
  const unpaidBillsEnd=billsEnd.reduce((s,b)=>s+getBillRemaining(b,paidMap),0)+(isCurYear&&curPeriod==='END'?carryover.total:0);
  // Separate paid map for the month the user is currently viewing/editing in the bills UI
  const viewPaidMap=DB.get('billPaid_'+projYear+'_'+billsViewMonth,{});

  const mtx={};
  for(let i=0;i<12;i++)mtx[i]={ib15:0,ibEnd:0,eb15:0,ebEnd:0};
  txs.filter(t=>{const d=new Date(t.date);return d.getFullYear()===projYear;}).forEach(t=>{
    const d=new Date(t.date);const mi=d.getMonth();const day=d.getDate();
    if(t.type==='INCOME'){if(day<=15)mtx[mi].ib15+=t.amount;else mtx[mi].ibEnd+=t.amount;}
    else{if(day<=15)mtx[mi].eb15+=t.amount;else mtx[mi].ebEnd+=t.amount;}
  });

  // ===== FIXED: Current balance reflected in projection =====
  let runBal=proj.initialCash;
  // Period snapshot for the current month (frozen value from the *other* period so
  // toggling Before 15th \u2194 Before End doesn't change the display until the user
  // actually edits it). Stored outside `overrides_<year>` so it does NOT count as an edit.
  const periodSnap=DB.get('periodSnap_'+projYear,{});
  const mdata=MONTHS.map((month,i)=>{
    const ov=overrides[i]||{};
    const s15=ov.salary15th!=null?ov.salary15th:proj.salary1;
    const sEnd=ov.salaryEnd!=null?ov.salaryEnd:proj.salary2;
    // Per-month bill totals: load this month's paid map and subtract any paid/partial amounts
    // so the projected "Bills" column reflects only what's still expected to be paid.
    const mPaid=DB.get('billPaid_'+projYear+'_'+i,{});
    const mBills15Full=billsForMonth(bills15All,i).reduce((s,b)=>s+b.amount,0);
    const mBillsEndFull=billsForMonth(billsEndAll,i).reduce((s,b)=>s+b.amount,0);
    const mBills15=billsForMonth(bills15All,i).reduce((s,b)=>s+getBillRemaining(b,mPaid),0);
    const mBillsEnd=billsForMonth(billsEndAll,i).reduce((s,b)=>s+getBillRemaining(b,mPaid),0);
    const mBills15Paid=mBills15Full-mBills15;
    const mBillsEndPaid=mBillsEndFull-mBillsEnd;
    const bE15=ov.bills15th!=null?ov.bills15th:mBills15;
    const bEEnd=ov.billsEnd!=null?ov.billsEnd:mBillsEnd;
    const oI15=(proj.otherInc1||0)+mtx[i].ib15;
    const oE15=mtx[i].eb15;
    const inc15=s15+oI15;
    const exp15=bE15+oE15;
    const calcR15=runBal+inc15-exp15;

    // KEY FIX: For current month + current period, use actual balance minus UNPAID bills only
    // Paid bills are already reflected in source balances, so don't deduct them again
    const isCur=isCurYear&&i===curMonth;
    const snap=isCur?(periodSnap[i]||{}):{};
    // For current month, the *other* period's value falls back to the snapshot taken at
    // the moment the user switched away from it (so the previously displayed amount stays
    // stable). It is NOT treated as a user override \u2014 toggling back recalculates fresh.
    let r15;
    if(isCur&&curPeriod==='15') r15=curBal-unpaidBills15;
    else if(ov.remaining15th!=null) r15=ov.remaining15th;
    else if(isCur&&curPeriod==='END'&&snap.r15!=null) r15=snap.r15;
    else r15=calcR15;

    const oIEnd=(proj.otherInc2||0)+mtx[i].ibEnd;
    const oEEnd=mtx[i].ebEnd;
    const incEnd=sEnd+oIEnd;
    const expEnd=bEEnd+oEEnd;
    const calcREnd=r15+incEnd-expEnd;

    let rEnd;
    if(isCur&&curPeriod==='END') rEnd=curBal-unpaidBillsEnd;
    else if(ov.remainingEnd!=null) rEnd=ov.remainingEnd;
    else if(isCur&&curPeriod==='15'&&snap.rEnd!=null) rEnd=snap.rEnd;
    else rEnd=calcREnd;

    const res={month,short:SHORT[i],i,startBal:runBal,s15,sEnd,bE15,bEEnd,oI15,oE15,oIEnd,oEEnd,inc15,exp15,r15,incEnd,expEnd,rEnd,
      totalInc:inc15+incEnd,totalExp:exp15+expEnd,isCur,
      mBills15Full,mBillsEndFull,mBills15Paid,mBillsEndPaid,
      ov_s15:ov.salary15th!=null,ov_sEnd:ov.salaryEnd!=null,ov_b15:ov.bills15th!=null,ov_bEnd:ov.billsEnd!=null,
      ov_r15:ov.remaining15th!=null,ov_rEnd:ov.remainingEnd!=null,
      // Track if auto-filled from current balance (not user-overridden but still special)
      auto_r15:isCur&&curPeriod==='15',
      auto_rEnd:isCur&&curPeriod==='END'
    };
    runBal=rEnd;
    return res;
  });
  const yrEnd=mdata[11].rEnd;
  const yrInc=mdata.reduce((s,m)=>s+m.totalInc,0);
  const yrExp=mdata.reduce((s,m)=>s+m.totalExp,0);

  return `
    <div class="animate-fadeInUp" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px">
      <div><h1 style="font-size:26px;font-weight:800;letter-spacing:-.5px">Yearly Projection</h1><p style="color:#525252;font-size:13px;margin-top:2px">Plan with dual salary periods</p></div>
      <select onchange="projYear=+this.value;render()" style="width:auto">${[currentYear-1,currentYear,currentYear+1,currentYear+2].map(y=>`<option value="${y}"${y===projYear?' selected':''}>${y}</option>`).join('')}</select>
    </div>
    <div class="animate-fadeInUp stagger-1" style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">
      <button class="tab-btn ${projTab==='setup'?'active':''}" onclick="projTab='setup';render()">💰 Setup</button>
      <button class="tab-btn ${projTab!=='setup'?'active':''}" onclick="projTab='proj';render()">📅 Projection</button>
    </div>
    ${projTab==='setup'?renderProjSetup(proj,bills15All,billsEndAll,totBills15,totBillsEnd,isCurYear,billsViewMonth,viewPaidMap,carryover):renderProjTable(mdata,yrEnd,yrInc,yrExp,curBal,isCurYear,curMonth,curPeriod,mtx,unpaidBills15,unpaidBillsEnd,carryover)}`;
}

function renderProjSetup(proj,bills15,billsEnd,totBills15,totBillsEnd,isCurYear,viewMonth,paidMap,carryover){
  const sym=getSymbol(getCurrency());
  const monthLabel=SHORT[viewMonth];
  const actualMonth=new Date().getMonth();
  const actualYear=new Date().getFullYear();
  const isViewingActual=isCurYear&&viewMonth===actualMonth;
  function getOrdinal(n){const s=['th','st','nd','rd'];const v=n%100;return s[(v-20)%10]||s[v]||s[0];}
  function billDueBadge(b){
    if(!b.dueDay)return '';
    if(isViewingActual){
      const today=new Date().getDate();
      if(today>b.dueDay)return '<span class="due-badge overdue">⚠️ Overdue ('+b.dueDay+getOrdinal(b.dueDay)+')</span>';
      if(today===b.dueDay)return '<span class="due-badge due-today">⏰ Due Today</span>';
      const daysLeft=b.dueDay-today;
      if(daysLeft<=3)return '<span class="due-badge due-soon">📅 Due in '+daysLeft+'d</span>';
      return '<span class="due-badge due-ok">📅 Due '+b.dueDay+getOrdinal(b.dueDay)+'</span>';
    }
    return '<span class="due-badge due-ok">📅 Due '+b.dueDay+getOrdinal(b.dueDay)+'</span>';
  }
  function billRow(b){
    const paidAmt=getBillPaidAmount(b,paidMap);
    const fullyPaid=paidAmt>=b.amount;
    const partial=paidAmt>0&&!fullyPaid;
    const isRec=b.recurring!==false;
    const isThisMonth=isRec||b.month===viewMonth;
    const status=fullyPaid?'paid':(partial?'partial':'unpaid');
    const statusIcon=fullyPaid?'✓':(partial?'◐':'✗');
    const pct=b.amount>0?Math.min(100,Math.round(paidAmt/b.amount*100)):0;
    const barColor=fullyPaid?'linear-gradient(90deg,#10b981,#34d399)':(partial?'linear-gradient(90deg,#fbbf24,#fde047)':'linear-gradient(90deg,#ef4444,#f87171)');
    const freqBadge=isRec
      ? '<span style="background:rgba(124,58,237,.15);color:#a78bfa;border:1px solid rgba(124,58,237,.25);border-radius:4px;padding:1px 5px;font-size:9px;font-weight:600;white-space:nowrap">🔁 Recurring</span>'
      : '<span style="background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25);border-radius:4px;padding:1px 5px;font-size:9px;font-weight:600;white-space:nowrap">📌 '+SHORT[b.month]+' only</span>';
    const dueBadge=isThisMonth?billDueBadge(b):'';
    const catIc=catIcon(b.category);
    const amtRight=fullyPaid
      ? `<span class="font-mono" style="font-size:13px;color:#10b981;font-weight:700">${fmt(b.amount)}</span><span style="font-size:9px;color:#737373;font-weight:600">PAID</span>`
      : partial
        ? `<span class="font-mono" style="font-size:13px;color:#fbbf24;font-weight:700">${fmt(b.amount-paidAmt)}</span><span style="font-size:9px;color:#525252">of ${fmt(b.amount)} • ${pct}%</span>`
        : `<span class="font-mono" style="font-size:13px;color:#ef4444;font-weight:700">${fmt(b.amount)}</span><span style="font-size:9px;color:#525252">due</span>`;
    return `<div class="bill-row ${status}${!isThisMonth?' dim':''}">
      <button class="bill-icon ${status}" onclick="${isThisMonth?`openBillPaymentDialog('${b.id}')`:''}" ${isThisMonth?'':'disabled'} title="${isThisMonth?'Click to record payment for '+monthLabel:'Not applicable this month'}">${statusIcon}</button>
      <div class="bill-body">
        <div class="bill-name"><span style="margin-right:5px;opacity:.85">${catIc}</span>${b.name}</div>
        <div class="bill-meta">
          ${freqBadge}
          ${dueBadge}
          <span style="font-size:9px;color:#525252">${b.category||'Bills'}</span>
        </div>
        ${(partial||fullyPaid)&&isThisMonth?`<div class="bill-progress"><span style="width:${pct}%;background:${barColor}"></span></div>`:''}
      </div>
      <div class="bill-amt">${amtRight}</div>
      <div class="bill-actions">
        <button class="btn btn-ghost btn-sm" onclick="openBillDialog(null,'${b.id}')" title="Edit bill">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteBill('${b.id}')" title="Delete bill">🗑</button>
      </div>
    </div>`;
  }
  // Per-view-month totals
  const curBills15=bills15.filter(b=>b.recurring!==false||b.month===viewMonth);
  const curBillsEnd=billsEnd.filter(b=>b.recurring!==false||b.month===viewMonth);
  const unpaid15=curBills15.reduce((s,b)=>s+getBillRemaining(b,paidMap),0);
  const unpaidEnd=curBillsEnd.reduce((s,b)=>s+getBillRemaining(b,paidMap),0);
  const curTot15=curBills15.reduce((s,b)=>s+b.amount,0);
  const curTotEnd=curBillsEnd.reduce((s,b)=>s+b.amount,0);
  const paid15=curTot15-unpaid15;
  const paidEnd=curTotEnd-unpaidEnd;
  const totalBills=curTot15+curTotEnd;
  const totalPaid=paid15+paidEnd;
  const totalUnpaid=unpaid15+unpaidEnd;
  const totalPct=totalBills>0?Math.round(totalPaid/totalBills*100):0;
  const billCount=curBills15.length+curBillsEnd.length;
  // Filter & sort helpers shared across both columns
  function applyFilters(arr){
    let out=arr.slice();
    if(billSearch){const q=billSearch.toLowerCase();out=out.filter(b=>(b.name||'').toLowerCase().includes(q)||(b.category||'').toLowerCase().includes(q));}
    if(billFilter!=='all'){
      out=out.filter(b=>{
        const isRec=b.recurring!==false;const isThisMonth=isRec||b.month===viewMonth;if(!isThisMonth)return false;
        const pa=getBillPaidAmount(b,paidMap);
        if(billFilter==='paid') return pa>=b.amount;
        if(billFilter==='partial') return pa>0&&pa<b.amount;
        if(billFilter==='unpaid') return pa<=0;
        return true;
      });
    }
    out.sort((a,b)=>{
      if(billSort==='name') return (a.name||'').localeCompare(b.name||'');
      if(billSort==='amount') return b.amount-a.amount;
      if(billSort==='status'){const sa=getBillPaidAmount(a,paidMap)>=a.amount?2:(getBillPaidAmount(a,paidMap)>0?1:0);const sb=getBillPaidAmount(b,paidMap)>=b.amount?2:(getBillPaidAmount(b,paidMap)>0?1:0);return sa-sb;}
      // default: due (overdue first within current month, then ascending, then no-due last)
      const ad=a.dueDay||999, bd=b.dueDay||999;
      return ad-bd;
    });
    return out;
  }
  const f15=applyFilters(bills15);
  const fEnd=applyFilters(billsEnd);
  const chip=(val,label,curr,group)=>`<button class="chip ${val===curr?'active':''}" onclick="${group}='${val}';render()">${label}</button>`;

        ${projInput('Salary #1 (15th)',proj.salary1,'salary1',sym)}
        ${projInput('Salary #2 (End)',proj.salary2,'salary2',sym)}
        ${projInput('Other Income (Before 15th)',proj.otherInc1,'otherInc1',sym)}
        ${projInput('Other Income (Before End)',proj.otherInc2,'otherInc2',sym)}
        ${projInput('Target Monthly Savings',proj.targetSavings,'targetSavings',sym)}

    <div class="glass-card-sm animate-fadeInUp stagger-2" style="margin-bottom:14px;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">

    </div>
    ${isCurYear&&carryover&&carryover.total>0?`<div class="glass-card animate-fadeInUp stagger-2" style="margin-bottom:14px;border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.04)"><div class="card-body" style="padding:12px 16px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px">
        <span style="font-size:16px">⏳</span>
        <b style="color:#fbbf24;font-size:12px">${carryover.items.length} unpaid bill${carryover.items.length===1?'':'s'} carried over from earlier periods</b>
        <span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:#fbbf24">${fmt(carryover.total)}</span>
        <button class="btn btn-sm" style="background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.35);color:#10b981;font-weight:700;font-size:10px;padding:4px 10px" onclick="payAllCarryoverBills()" title="Mark every carried-over bill as fully paid">✓ Pay All Previous</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${carryover.items.slice(0,10).map(it=>`<button class="btn btn-ghost btn-sm" style="font-size:10px;padding:3px 8px;border:1px solid rgba(251,191,36,.25);background:rgba(251,191,36,.06);color:#fbbf24" onclick="billsViewMonth=${it.month};render();setTimeout(()=>openBillPaymentDialog('${it.bill.id}'),60)">${SHORT[it.month]} · ${it.bill.name} · ${fmt(it.remaining)}</button>`).join('')}
        ${carryover.items.length>10?`<span style="font-size:10px;color:#737373;align-self:center">+${carryover.items.length-10} more</span>`:''}
      </div>
    </div></div>`:''}
    ${billCount>0?`<div class="glass-card animate-fadeInUp stagger-2" style="margin-bottom:14px"><div class="card-body" style="padding:14px 16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">
        <div style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;font-weight:700">📊 ${monthLabel} Bills Overview</span><span style="font-size:10px;color:#525252;font-weight:600">${billCount} bill${billCount>1?'s':''}</span></div>

// ===== LANDSCAPE TABLE VIEW (mobile) =====
// Opens the full projection table in a fullscreen overlay.
// Tries the real Screen Orientation API first; falls back to a CSS rotate
// on browsers that don't allow orientation lock (e.g., iOS Safari).
function _projLandscapeEsc(e){if(e.key==='Escape')closeProjLandscape();}
function openProjLandscape(){
  const tableEl=document.querySelector('.proj-table-wrap');
  if(!tableEl){showToast('Open the Yearly Plan tab first','info');return;}
  const existing=document.getElementById('projLandscapeOverlay');
  if(existing) existing.remove();
  const overlay=document.createElement('div');
  overlay.id='projLandscapeOverlay';
  overlay.className='proj-landscape-overlay';
  overlay.innerHTML=`
    <div class="pl-bar">
      <span class="pl-hint">Pinch to zoom • scroll to pan</span>
      <button class="pl-close" onclick="closeProjLandscape()">✕ Close</button>
    </div>
    <div class="pl-stage">${tableEl.outerHTML}</div>
  `;
  document.body.appendChild(overlay);
  document.addEventListener('keydown',_projLandscapeEsc);
  // Try real fullscreen + landscape orientation lock; fall back to CSS rotate.
  const el=document.documentElement;
  const req=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;
  const tryLock=()=>{
    if(screen.orientation&&screen.orientation.lock){
      screen.orientation.lock('landscape').catch(()=>overlay.classList.add('forced-rotate'));
    } else {
      overlay.classList.add('forced-rotate');
    }
  };
  if(req){
    try{
      const p=req.call(el);
      if(p&&p.then) p.then(tryLock).catch(()=>{overlay.classList.add('forced-rotate');});
      else tryLock();
    }catch(_){overlay.classList.add('forced-rotate');}
  } else {
    overlay.classList.add('forced-rotate');
  }
}
function closeProjLandscape(){
  const overlay=document.getElementById('projLandscapeOverlay');
  if(overlay) overlay.remove();
  document.removeEventListener('keydown',_projLandscapeEsc);
  try{if(screen.orientation&&screen.orientation.unlock) screen.orientation.unlock();}catch(_){}
  try{if(document.fullscreenElement) document.exitFullscreen();}catch(_){}
}

function payAllBills(period){
  const bills=DB.get('bills_'+projYear,[]).filter(b=>b.period===period&&(b.recurring!==false||b.month===billsViewMonth));
  if(bills.length===0){showToast('No bills to pay','info');return;}
  const m=billsViewMonth, y=projYear;
  const key='billPaid_'+y+'_'+m;
  const pm=DB.get(key,{});
  const unpaid=bills.filter(b=>getBillPaidAmount(b,pm)<b.amount);
  if(unpaid.length===0){showToast('All bills already fully paid for '+SHORT[m],'info');return;}
  const totalRemaining=unpaid.reduce((s,b)=>s+(b.amount-getBillPaidAmount(b,pm)),0);
  if(!confirm(`Mark ${unpaid.length} unpaid bill(s) as fully paid for ${SHORT[m]} ${y}?\nTotal remaining: ${fmt(totalRemaining)}\n\n(Source balances are NOT deducted by this shortcut. Pay individually if you need to record the source.)`)) return;
  unpaid.forEach(b=>{pm[b.id]=b.amount;});
  DB.set(key,pm);
  showToast(`Marked ${unpaid.length} bill(s) as paid for ${SHORT[m]} ${y}`,'success');
  render();
}

// Mark every carried-over (previous-period) unpaid bill as fully paid.
// Uses the same shortcut convention as payAllBills: doesn't touch source balances.
function payAllCarryoverBills(){
  const now=new Date();
  const curMonth=now.getMonth();
  const curPeriod=getCurrentPeriod(projYear,curMonth);
  const carryover=getCarryoverUnpaidBills(projYear,curMonth,curPeriod);
  if(!carryover.total||carryover.items.length===0){showToast('No carryover bills to pay','info');return;}
  if(!confirm(`Mark all ${carryover.items.length} carryover bill(s) as fully paid?\nTotal: ${fmt(carryover.total)}\n\n(Source balances are NOT deducted by this shortcut. Pay individually to record sources.)`)) return;
  // Group by month key so we minimize DB writes.
  const byMonth={};
  carryover.items.forEach(it=>{
    const k='billPaid_'+projYear+'_'+it.month;
    if(!byMonth[k]) byMonth[k]=DB.get(k,{});
    byMonth[k][it.bill.id]=it.bill.amount;
  });
  Object.keys(byMonth).forEach(k=>DB.set(k,byMonth[k]));
  showToast(`Cleared ${carryover.items.length} carryover bill(s) \u2014 ${fmt(carryover.total)} marked paid`,'success');
  render();
}

// Renders one card per month. Visible only on screens <=768px via CSS.
// Same editable cells (ec) so tap-to-edit / right-click-to-reset still work.
function renderProjCards(mdata,mtx,isCurYear,curMonth,curPeriod){
  return mdata.map(m=>{
    const isCur=m.isCur;
    const neg=m.rEnd<0;
    const cls=`proj-card${isCur?' current':''}${neg?' negative':''}`;
    const tx=mtx[m.i];
    const periodTag=isCur?`<span class="pc-pill cur">● ${curPeriod==='15'?'Before 15th now':'Before End now'}</span>`:'';
    const statusTag=neg?'<span class="pc-pill neg">⚠️ Negative</span>':'<span class="pc-pill on">✅ On track</span>';
    function row(label,colorCls,inner){return `<div class="pc-row"><span class="lbl">${label}</span><span class="val ${colorCls}">${inner}</span></div>`;}
    function periodBlock(title,colorVar,cls2,salary,salaryField,salaryOv,otherInc,bills,billsField,billsOv,otherExp,paidInfo,remaining,remainingField,remainingOv,remainingAuto){
      const remColor=remaining>=0?'#10b981':'#ef4444';
      return `<div class="pc-period ${cls2}">
        <div class="pc-period-head">
          <span class="pc-period-title" style="color:${colorVar}">${title}</span>
          <span class="pc-period-rem" style="color:${remColor}">${ec(remaining,m.i,remainingField,remainingOv,remaining>=0?'text-green':'text-red',remainingAuto)}</span>
        </div>
        ${row('💵 Salary','text-green',ec(salary,m.i,salaryField,salaryOv,'text-green'))}
        ${otherInc>0?row('+ Other Income','text-cyan font-mono','+'+fmt(otherInc)):''}
        ${row('🧾 Bills','text-red',ec(bills,m.i,billsField,billsOv,'text-red',false,paidInfo))}
        ${otherExp>0?row('+ Other Expense','text-orange font-mono','+'+fmt(otherExp)):''}
      </div>`;
    }
    return `<div class="${cls}">
      <div class="pc-head">
        <span class="pc-month">${m.month}${isCur?' <span style="color:#a78bfa;font-size:13px">●</span>':''}</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">${periodTag}${statusTag}</div>
      </div>
      <div class="pc-body">
        ${periodBlock('💙 Before 15th','#60a5fa','p15',m.s15,'salary15th',m.ov_s15,tx.ib15,m.bE15,'bills15th',m.ov_b15,tx.eb15,m.mBills15Paid>0?{paid:m.mBills15Paid,full:m.mBills15Full}:null,m.r15,'remaining15th',m.ov_r15,m.auto_r15)}
        ${periodBlock('💜 Before End','#a78bfa','pend',m.sEnd,'salaryEnd',m.ov_sEnd,tx.ibEnd,m.bEEnd,'billsEnd',m.ov_bEnd,tx.ebEnd,m.mBillsEndPaid>0?{paid:m.mBillsEndPaid,full:m.mBillsEndFull}:null,m.rEnd,'remainingEnd',m.ov_rEnd,m.auto_rEnd)}

}

// Editable cell - now shows ★ for auto-filled current balance
function ec(val,month,field,isOv,cls,isAuto,paidInfo){
  const marker=isAuto?'<span style="color:#a78bfa;font-size:9px;margin-left:1px">★</span>':'';
  const paidMarker=paidInfo&&!isOv?`<span style="color:#10b981;font-size:9px;margin-left:2px" title="Reduced by ${fmt(paidInfo.paid)} paid of ${fmt(paidInfo.full)} total">✓</span>`:'';
  const paidTip=paidInfo&&!isOv?` — ${fmt(paidInfo.paid)} already paid of ${fmt(paidInfo.full)}`:'';
  const resetBtn=isOv?`<span class="ec-reset" onclick="event.stopPropagation();resetOverride(${month},'${field}')" title="Reset to original value">↺</span>`:'';
  return `<span class="editable font-mono ${cls} ${isOv?'overridden':''}" onclick="startEdit(event,${month},'${field}',${val})" oncontextmenu="if(${isOv}){event.preventDefault();resetOverride(${month},'${field}')}" title="${isOv?'Custom (right-click or tap ↺ to reset)':isAuto?'Auto from current balance (click to override)':'Click to edit'}${paidTip}">${fmt(val)}${marker}${paidMarker}</span>${resetBtn}`;
}
function startEdit(e,month,field,currentVal){
  const el=e.target.closest('.editable');
  const wrap=document.createElement('span');wrap.className='edit-wrap';
  const inp=document.createElement('input');inp.type='number';inp.step='0.01';inp.value=currentVal;inp.className='edit-input';
  const btn=document.createElement('button');btn.type='button';btn.className='edit-calc-btn';btn.innerHTML='🧮';btn.title='Send value to calculator';
  let suppressCommit=false;
  // Fire on mousedown/touchstart so we beat the input's blur->commit->render cycle
  // that would otherwise destroy the button before its 'click' could fire.
  const trigger=(ev)=>{
    ev.preventDefault();ev.stopPropagation();
    suppressCommit=true;
    sendProjEditToCalc(month,field,inp);
  };
  btn.addEventListener('mousedown',trigger);
  btn.addEventListener('touchstart',trigger,{passive:false});
  wrap.appendChild(inp);wrap.appendChild(btn);
  el.innerHTML='';el.appendChild(wrap);inp.focus();inp.select();
  function commit(){if(suppressCommit)return;const nv=parseFloat(inp.value);if(!isNaN(nv)&&nv!==currentVal){const ov=DB.get('overrides_'+projYear,{});if(!ov[month])ov[month]={};ov[month][field]=nv;DB.set('overrides_'+projYear,ov);}render();}
  inp.onblur=commit;inp.onkeydown=function(e){if(e.key==='Enter')commit();if(e.key==='Escape')render();};
}
function resetOverride(month,field){const ov=DB.get('overrides_'+projYear,{});if(ov[month]){delete ov[month][field];if(Object.keys(ov[month]).length===0)delete ov[month];}DB.set('overrides_'+projYear,ov);render();}
function resetAllProjOverrides(){
  const ov=DB.get('overrides_'+projYear,{});
  const count=Object.keys(ov).length;
  if(count===0){showToast('No overrides to reset','info');return;}
  if(!confirm(`Reset all ${count} month override(s) for ${projYear}?\n\nThis returns every manually edited cell to its calculated value.`))return;
  DB.set('overrides_'+projYear,{});
  showToast('All projection overrides cleared','success');
  render();
}

function clearUserData(){const prefix=DB._prefix();const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith(prefix))keys.push(k);}keys.forEach(k=>localStorage.removeItem(k));DB.invalidate();FilePersist.autoSave();}
function exportData(){const data=FilePersist._gatherAll();const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='budget-tracker-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);showToast('Data exported!','success');}
function importData(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(ev){try{const data=JSON.parse(ev.target.result);if(data.version===2&&data.users){const existing=Auth.getUsers();data.users.forEach(u=>{if(!existing.find(e=>e.id===u.id))existing.push(u);});Auth.setUsers(existing);if(data.userData)Object.entries(data.userData).forEach(([uid,udata])=>{Object.entries(udata).forEach(([k,v])=>localStorage.setItem('bt_'+uid+'_'+k,v));});}else{Object.entries(data).forEach(([k,v])=>{if(k.startsWith('bt_'))localStorage.setItem(k,v);});}DB.invalidate();render();showToast('Data imported!','success');}catch{showToast('Invalid file format','error');}};reader.readAsText(file);e.target.value='';}

function loadCalcHistory(){calcHistory=DB.get('calcHistory',[]);calcMemory=parseFloat(DB.get('calcMemory','0'))||0;}
function saveCalcHistory(){DB.set('calcHistory',calcHistory);}

// Holds {month, field} for a projection cell currently being edited via the calculator.

// Called from the 🧮 button inside an inline projection edit cell.
function sendProjEditToCalc(month,field,inp){
  const val=parseFloat(inp.value);

  inp.onblur=null;
  _projCalcTarget={month,field};
  calcTarget='__projOverride__';
  calcDisp=(!isNaN(val)?String(val):'0');

function bindCalcKeyboard(){
  if(calcKbdBound) return; calcKbdBound=true;
  document.addEventListener('keydown',e=>{
    if(!calcDrawerOpen) return;
    const tag=(e.target&&e.target.tagName)||'';
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
    if(/^[0-9]$/.test(e.key)){calcDigit(e.key);e.preventDefault();return;}
    if(e.key==='.'){calcDot();e.preventDefault();return;}
    if(e.key==='+'||e.key==='-'||e.key==='*'||e.key==='/'){calcOp(e.key);e.preventDefault();return;}
    if(e.key==='Enter'||e.key==='='){calcEquals();e.preventDefault();return;}
    if(e.key==='Backspace'){calcBack();e.preventDefault();return;}
    if(e.key==='Escape'){calcClear();e.preventDefault();return;}
    if(e.key==='%'){calcPercent();e.preventDefault();return;}
  });
}

function _calcRound(v){return Math.round(v*1e10)/1e10;}
function _calcExprStr(){if(calcPrev==null||calcOper==null)return '';return `${calcPrev} ${CALC_OP_SYM[calcOper]||calcOper}${calcWait?'':' '+calcDisp}`;}
function calcDigit(d){calcDisp=(calcWait||calcDisp==='0')?d:calcDisp+d;calcWait=false;calcExpr=_calcExprStr();updCalc();}
function calcDot(){if(calcWait){calcDisp='0.';calcWait=false;}else if(!calcDisp.includes('.'))calcDisp+='.';calcExpr=_calcExprStr();updCalc();}
function calcClear(){calcDisp='0';calcPrev=null;calcOper=null;calcWait=false;calcExpr='';updCalc();}
function calcBack(){if(calcWait)return;if(calcDisp.length<=1||(calcDisp.length===2&&calcDisp.startsWith('-')))calcDisp='0';else calcDisp=calcDisp.slice(0,-1);calcExpr=_calcExprStr();updCalc();}
function calcSign(){if(calcDisp==='0')return;calcDisp=calcDisp.startsWith('-')?calcDisp.slice(1):'-'+calcDisp;calcExpr=_calcExprStr();updCalc();}
function calcPercent(){calcDisp=String(_calcRound(parseFloat(calcDisp)/100));calcExpr=_calcExprStr();updCalc();}
function calcOp(op){if(calcPrev!=null&&!calcWait){calcEquals(true);}calcPrev=parseFloat(calcDisp);calcOper=op;calcWait=true;calcExpr=`${calcPrev} ${CALC_OP_SYM[op]||op}`;updCalc();}
function calcEquals(chain){
  if(calcPrev==null||calcOper==null){calcExpr='';updCalc();return;}
  const a=calcPrev,b=parseFloat(calcDisp);
  let r;
  switch(calcOper){case'+':r=a+b;break;case'-':r=a-b;break;case'*':r=a*b;break;case'/':r=b!==0?a/b:0;break;}
  r=_calcRound(r);
  const expr=`${a} ${CALC_OP_SYM[calcOper]||calcOper} ${b}`;
  calcHistory.push({expr,result:String(r),ts:Date.now()});
  if(calcHistory.length>50)calcHistory=calcHistory.slice(-50);
  saveCalcHistory();
  calcDisp=String(r);calcPrev=null;calcOper=null;calcWait=true;
  calcExpr=chain?'':`${expr} =`;
  updCalc();
  if(calcHistoryOpen)renderCalcDrawer(); // only repaint full drawer if history is visible
}
function updCalc(){
  const el=document.getElementById('calcDisplay');
  if(el){const n=parseFloat(calcDisp);el.textContent=isNaN(n)||calcDisp.endsWith('.')?calcDisp:(n<0?'-':'')+Math.abs(n).toLocaleString(undefined,{maximumFractionDigits:10});}
  const ex=document.getElementById('calcExprLine');if(ex) ex.innerHTML=calcExpr||'&nbsp;';
}
function calcRecall(v){calcDisp=String(v);calcWait=true;updCalc();}
function calcCopyDisplay(){if(navigator.clipboard)navigator.clipboard.writeText(calcDisp).then(()=>showToast('Copied '+calcDisp,'info')).catch(()=>{});}
function _updateMemPillUI(){
  // Only re-render the drawer if its memory pill visibility actually flipped.
  const active=Math.abs(calcMemory)>0.0001;
  const hasPill=!!document.querySelector('#calcDrawer .mem-pill');
  if(active!==hasPill){renderCalcDrawer();return;}
  if(active){const v=document.querySelector('#calcDrawer .mem-pill .mem-val');if(v)v.textContent=fmt(calcMemory);}
}
function calcMemAdd(){calcMemory=_calcRound(calcMemory+(parseFloat(calcDisp)||0));saveCalcMemory();showToast('M+ → '+fmt(calcMemory),'info');_updateMemPillUI();}
function calcMemSub(){calcMemory=_calcRound(calcMemory-(parseFloat(calcDisp)||0));saveCalcMemory();showToast('M− → '+fmt(calcMemory),'info');_updateMemPillUI();}
function calcMemRecall(){if(Math.abs(calcMemory)<0.0001){showToast('Memory empty','info');return;}calcDisp=String(calcMemory);calcWait=true;updCalc();}
function calcMemClear(){calcMemory=0;saveCalcMemory();showToast('Memory cleared','info');_updateMemPillUI();}
function calcUse(){
  // Special path: projection cell edit (no live input in DOM).
  if(calcTarget==='__projOverride__'&&_projCalcTarget){
    const {month,field}=_projCalcTarget;
    const nv=parseFloat(calcDisp);
    if(!isNaN(nv)){
      const ov=DB.get('overrides_'+projYear,{});
      if(!ov[month])ov[month]={};
      ov[month][field]=nv;
      DB.set('overrides_'+projYear,ov);
      showToast('Saved '+fmt(nv)+' to projection cell','success');
    }
    _projCalcTarget=null;calcTarget=null;calcDrawerOpen=false;
    renderCalcDrawer();render();
    return;
  }
  if(calcTarget){const el=document.getElementById(calcTarget);if(el){el.value=calcDisp;el.dispatchEvent(new Event('change'));el.dispatchEvent(new Event('input'));}}
  calcTarget=null;calcDrawerOpen=false;renderCalcDrawer();
}
function calcAdjustSource(action){
  const srcId=calcAdjustSrcId||document.getElementById('calcAdjustSrc')?.value;
  if(!srcId){showToast('Pick a source first','warn');return;}
  const val=parseFloat(calcDisp);
  if(isNaN(val)||val===0){showToast('No amount to adjust','warn');return;}
  const sources=DB.get('sources',[]);
  const src=sources.find(s=>s.id===srcId);
  if(!src){showToast('Source not found','error');calcAdjustSrcId='';return;}
  const absVal=Math.abs(val);
  const isIncrease=action==='increase';
  calcPrompt={kind:'confirm',srcId,name:src.name,oldBal:src.balance,action,absVal,desc:'Discrepancy',cat:'Other'};
  renderCalcDrawer();
  setTimeout(()=>{const i=document.getElementById('cpDesc');if(i){i.focus();i.select();}},10);
}
function confirmCalcAdjust(){
  if(!calcPrompt||calcPrompt.kind!=='confirm')return;
  const {srcId,action,absVal}=calcPrompt;
  const desc=(document.getElementById('cpDesc')?.value||'').trim()||'Discrepancy';
  const cat=document.getElementById('cpCat')?.value||'Other';
  const sources=DB.get('sources',[]);
  const idx=sources.findIndex(s=>s.id===srcId);
  if(idx<0){showToast('Source not found','error');return;}
  const isIncrease=action==='increase';
  if(isIncrease){sources[idx].balance+=absVal;}else{sources[idx].balance-=absVal;}
  DB.set('sources',sources);
  const txs=DB.get('transactions',[]);
  txs.push({id:DB.id(),type:isIncrease?'INCOME':'EXPENSE',category:cat,amount:absVal,sourceId:srcId,date:new Date().toISOString(),description:desc});
  DB.set('transactions',txs);
  const label=isIncrease?'Increase':'Deduct';
  calcHistory.push({expr:`${label} ${fmt(absVal)} → ${sources[idx].name} (${desc})`,result:fmt(sources[idx].balance),ts:Date.now()});
  if(calcHistory.length>50)calcHistory=calcHistory.slice(-50);
  saveCalcHistory();
  showToast(`${label}ed ${fmt(absVal)} ${isIncrease?'to':'from'} ${sources[idx].name}`,'success');
  calcPrompt=null;
  calcAdjustSrcId=srcId; // keep source locked for follow-up adjustments
  renderCalcDrawer();
  render();
}
function calcSourceSelected(sel){
  const opt=sel.options[sel.selectedIndex];
  if(!opt||!opt.value){calcAdjustSrcId='';calcPrompt=null;renderCalcDrawer();return;}
  calcAdjustSrcId=opt.value;
  const bal=parseFloat(opt.getAttribute('data-bal'));
  if(isNaN(bal))return;
  const name=opt.textContent.replace(/\s*\(.*\)\s*$/,'');
  // Skip prompt if calc already shows that exact balance
  if(parseFloat(calcDisp)===bal){calcPrompt=null;renderCalcDrawer();return;}
  calcPrompt={kind:'load',srcId:opt.value,name,bal};
  renderCalcDrawer();
}
function calcClearAdjustSrc(){calcAdjustSrcId='';calcPrompt=null;renderCalcDrawer();}
